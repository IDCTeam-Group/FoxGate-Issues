#
# Limit the access to certain IP ranges.
# This feature will blocks to certain ranges of an ISP.
# If you find an ISP but you can't block it because legit
# connection but has hosting services, this feature it's
# for you. Block only the IP's that you want or make
# bypass If neccessary.
#
# 📚 Note: This feature supports CIDR.
# ⏳ Previously (for nostalgic): Pattern model.
# The format for this model it's 'X.X.X.X/b', where 'b' means
# the bits of the LAN. Here some examples of this model:
#
#  🧩 'X.X.X.X' or 'X.X.X.X/32'
#  Thisformat allows to block one exactly IP.
#
#  🧩 'X.X.X.X/24'
#  This will blocks an entirely range from an IP,
#  in this case, will block from: 'X.X.X.0' to 'X.X.X.255'
#
#  🧩 'X.X.X.X/21'
#  This example of bits in 21, will block all ranges in the
#  next way: '217.26.208.0' it's the range where you want to
#  start blocking and this will end in '217.26.215.0'.
#
# 📍 See more of about CIDR in:
# https://www.ipxo.com/blog/what-is-cidr/
#
# ⚠️ Warning! The plugin will convert the old format in CIDR
# just for migration, you has time for migrate to CIDR before
# removing this system.
#
# ❓ Has questions? Join to the discord server:
# - https://discord.zowi.gay/
# - https://discord.idcteam.xyz/

# 📁 Enable this feature?
enable: true

# Bypass detections of FoxGate.
bypass:

    # 🚩 Add the list of Ranges allowed for bypass detections
    # of VPN in FoxGate. Use the value "[]" to disable, like:
    #
    #  list: []
    #
    # 📚 Example of this configuration.
    #
    # list:
    # - "162.159.193.0/24"
    # - "1.1.1.0/24"
    list: [
        ]
    # 👤 Blacklist the bypass to these name's.
    blacklist_name:
    - ImZowi
    - ImLowiii
    # 👤 Blacklist the bypass to these IP's.
    blacklist_ip:
    - 127.0.0.1

# Whitelist/blacklist connections from X IPRange.
# The player is blocked from joining but the IP doesn't get verified!
blocker:

    # 🧰 Define the type of usage to this list.
    # - 'whitelist': Allow the access to certain Ranges.
    # - 'blacklist': Deny the access in certain Ranges.
    type: blacklist

    # 📁 Add the list of Ranges for block/allow connections
    # to the server. Use the value "[]" to disable, like:
    #
    #  list: []
    list:
    - 130.185.255.0/24
    - 145.14.133.0/24
    - 171.22.254.0/24

    # ✨ Automatically download and block known malicious IP lists.
    # - Contains sub-lists for known malicious Ranges, Tors
    #   and Residential Proxies. Each one can be toggled individually
    #   and supports Zowi's Central and custom sources/lists.
    #
    # 📚 Note: You can report false flags at:
    # ➡ https://discord.zowi.gay/
    known:

        # ⭕ Known malicious IP Ranges.
        # - Block hosting, VPN and others malicious ranges done
        #   by the FoxGate community via Zowi's Central and/or a
        #   custom external provider.
        #
        # 📚 Note: This list can cause sometimes false flags if you
        # are using Zowi's Central. Why? Those IPs can change anytime and
        # are blacklisted for being malicious, residential proxy or
        # others reasons in the moment.
        ranges:

            # 🚩 Enable this feature?
            enable: true
            # ⌛ Time (in hours) to scanning for downloading new
            # information about known ranges list.
            # - People can help in report known malicious ranges and
            #   save in a list, which everyone with the plugin can
            #   download and prevent more VPNs, Bots, and others stuff.
            #
            #   ➡ Use 'DISABLE' for disable the update.
            time: '12'

            # 🧰 External provider.
            # - Use this option in case you want use another external
            #   list of ranges. The plugin tries to handle it and update
            #   it.
            #   ⚠ Requeriments:
            #     - Needs to be a JSON(5) format.
            #     - Needs to be HTTPS always.
            #     - Needs to return file size in header (avoid issues, If isn't raw).
            #     - Needs to return status 200.
            #     - Needs to be a dowloadable file in output (If isn't raw).
            #     - Needs to be a array-json format only.
            #
            # 📚 Note: Supports JSON5, but requires to be a JSON format,
            # without a JSON5 feature (plugin uses Gson for load and cache).
            # ➡ https://discord.zowi.gay/
            provider:

                # 📁 Enable the external provider?
                enabled: false
                # 🔗 URL to get the downloadable/raw file.
                # - Follow all requeriments attached above first
                #   for enabling provider. Leaving this empty will
                #   make the feature non-functional.
                url: ''

            # 💼 Exclude specific Ranges from the known list
            # in case of false flags:
            #
            #  - 1.1.1.0/24
            #  - 1.1.0.0/23
            #
            # 📚 Note: You can request removal at: https://discord.zowi.gay/
            excluded: [
                ]

        # 🧅 Known Tors.
        # - Block players connecting through the Tor network.
        #   Supports Zowi's Central and/or custom sources/lists.
        #
        # 📚 Note: Block a Tor sometimes can be a bit hard, but
        # using a good provider, can block better. This can block
        # some connections from 'McOverTor' faster before reach
        # to services. Also, some bots uses Tor.
        tors:

            # 🚩 Enable this feature?
            enable: true
            # ⌛ Time (in hours) to scanning for downloading new
            # information about Tor lists.
            #
            #   ➡ Use 'DISABLE' for disable the update.
            time: '12'

            # 📍 Download from Zowi's Central.
            # - Make the plugin download our latest cached known malicious
            #   tor from our backend. That list updates constantly for adding
            #   new malicious IPs and helps to you in block more accurate.
            backend: true

            # 📋 Custom downloadable sources for Tor exit node lists.
            # - Add any list that returns IPs or CIDR ranges.
            #   The plugin just works with some available formats for the
            #   lists, one invalid can just skip from downloading/read.
            #
            # ⚠️ Supported formats:
            #   - Plain-text: one IP/CIDR per line.
            #   - JSON array: ["1.2.3.4", "5.6.7.0/24", ...]
            #
            # 📚 Note: Use '[]' to disable custom sources.
            # ⚠️ Warning! Lines starting with '#' are ignored, only in
            # plain-text format.
            sources:
            - https://check.torproject.org/torbulkexitlist

        # 🚩 Known Residential Proxies and Proxies.
        # - Block Residential proxy IPs. Zowi's Central is capable
        #   of detecting residential proxies, which are significantly
        #   harder to identify than traditional datacenter proxies.
        #   Supports Zowi's Central and/or custom sources/lists.
        #
        # 📚 Note: You can too use custom sources/lists to block commonly proxies
        # for provide extra layer. By default, FoxGate includes some for protect
        # you from malicious actors.
        proxies:

            # 🚩 Enable this feature?
            enable: true
            # ⌛ Time (in hours) to scanning for downloading new
            # information about proxies and residential proxies.
            #
            #   ➡ Use 'DISABLE' for disable the update.
            time: '12'

            # 📍 Download from Zowi's Central.
            # - Make the plugin download our latest cached known malicious
            #   proxies from our backend. That list updates constantly for adding
            #   new malicious IPs and helps to you in block more accurate.
            #
            # 📚 Note: This feature doesn't will works until you get a key with
            # this feature enable. Anyway, you can use external lists for download lists.
            # ⚠️ WARNING! Zowi's Central contains their own list of residential
            # proxies, a tool that have a cost of $1.99 USD. You can bought this in
            # the Plus Edition like an addon, you just need to contact in the discord
            # server support for receive a key that enables this feature.
            #
            #  ⭕ Contact us: https://discord.zowi.gay/
            #     Alternative: https://discord.idcteam.xyz/
            #
            # This can also enable the usage in the API with same key, you will receive
            # extra requests and that tool unblocked. Just to clarify, this uses our intelligence
            # for detection about this. BYPASS CAN BE EXCEPTED, NOT ALL IT'S CACHED!
            #
            # Powered by FoxGate Analyzer 🦊
            residential_proxy:

                # 🚩 Enable this feature?
                enable: true

                # 🌱 Detect only when the residential proxy are in cross-provider.
                # - Enable this feature when you want to only detect the residential proxy
                #   if was detected in two or more providers. Useful to reduce false flags
                #   because sometimes one provider means that the connection isn't totally
                #   "a risk", but allows to be more easy to be bypassed if the provider
                #   it's detected but only in one service.
                #
                # ⭐ Recommended: false
                crossproviders_only: false

                # 🧵 [PLACEHOLDER] Current and available residential proxies providers
                # being cached by our backend.
                # - This updates constantly and when checks for a new update, the list can be
                #   updated dinamically with a modern result, independent of your version of
                #   FoxGate.
                providers:
                - IPRoyal
                - Proxy-Seller
                - 711Proxy

            # 📋 Custom downloadable sources for Proxies lists.
            # - Add any list that returns IPs or CIDR ranges.
            #   The plugin just works with some available formats for the
            #   lists, one invalid can just skip from downloading/read.
            #
            # ⚠️ Supported formats:
            #   - Plain-text: one IP/CIDR per line.
            #   - JSON array: ["1.2.3.4", "5.6.7.0/24", ...]
            #
            # 📚 Note: Use '[]' to disable custom sources.
            # ⚠️ Warning! Lines starting with '#' are ignored, only in
            # plain-text format.
            sources:
            - https://tcpshield.com/blocklist.txt
            - https://cinsscore.com/list/ci-badguys.txt
            - https://blocklist.greensnow.co/greensnow.txt
            - https://lists.blocklist.de/lists/all.txt
            - https://api.proxyscrape.com/v2/?request=getproxies&protocol=all&timeout=10000&country=all&ssl=all&anonymity=all
            - https://az0-vpnip-public.oooninja.com/ip.txt

    # 🦊 Block connections from denied IP using the database?
    # - This is useful if you want deny connections from future
    #   issuers that connects in denied ranges of IPs.
    #
    #   "The player is blocked from joining but the IP doesn't get checked!"
    #    FoxGate add's the player to the database like it's "Blocked", but
    #    doesn't save services detected, because the player isn't scanned for
    #    VPN/Proxy or by another module.
    database:

        # 🚩 Block future connections using the database?
        enable: true
        # Determine the time in hours to mantain the block when a
        # player get detected for this module. This avoid to the user from
        # joining until the expiration time ends and, saving the server
        # resources for not scanning through modules and services.
        #
        # ⭐ Recommended: 2
        # 📚 Note: Type 'permanent' for blocking permanent.
        time: '2'

    # 👤 Whitelist the detection to this name's.
    whitelist_name:
    - ImZowi
    - ImLowiii
    # 👤 Whitelist the detection to this IP's.
    whitelist_ip:
    - 127.0.0.1

    # 🚩 Actions to make when is detected.
    # - Use this to kick with the plugin instantly:
    #     - 'kick'
    # - Or add your custom command:
    #     - 'ipban {IP} The IP it's in a malicious range.
    #
    # Disable this feature by leaving the list empty.
    actions:
    - kick
