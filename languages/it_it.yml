# 🔨 Configura i messaggi del plugin.
# Puoi usare MiniMessage in questa sezione. Funzionano anche
# i vecchi colori Bukkit, ma non è raccomandato a causa di
# incompatibilità!
# Inoltre, PlaceholderAPI è supportato.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Formato:
# https://docs.advntr.dev/minimessage/format.html
message:

   # Messaggio di kick quando il plugin blocca un giocatore.
   #
   # {PLAYER} - Restituisce il nome del giocatore.
   # {IP} - Restituisce l'IP del giocatore.
   # {UUID} - Restituisce l'UUID del giocatore. (BungeeCord non lo supporta)
   # {ISP} - Restituisce l'ISP dell'IP, (se è in cache/IP), dal modulo ISP.
   # {HOSTNAME} - Restituisce l'Hostname dell'IP, (se è in cache/IP), dal modulo ISP.
   # {GEO_COUNTRY} - Restituisce il Paese del giocatore. (Funziona solo con la versione premium).
   # {GEO_ASN} - Restituisce l'ASN del giocatore (Funziona solo con la versione premium).
   kick:
      vpn: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>La tua connessione è stata rifiutata perché è VPN o Proxy.\n<gray>Prova a disattivare prima il tuo VPN/proxy prima di connetterti.</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Modulo: Servizi</dark_gray>'
      iplimiter: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>La tua connessione è stata rifiutata per connettersi.\n<gray>Abbiamo trovato troppe connessioni sul tuo stesso IP.</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Modulo: IPLimiter</dark_gray>'
      isp: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>La tua connessione è stata rifiutata perché dannosa.\n<gray>Il Provider Internet "<light_purple>{ISP}</light_purple>" che usi è vietato su questo server.</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Modulo: ISPFilter</dark_gray>'
      iprange: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>La tua connessione è stata rifiutata perché dannosa.\n<gray>L'IP è in una blacklist nel nostro database perché si trova in un range dannoso.</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Modulo: IPRange</dark_gray>'
      bogon: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>La tua connessione è stata rifiutata perché bogon.\n<gray>L'IP è considerato bogon (rete privata).</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz'
      country: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>La tua connessione è stata rifiutata perché dannosa.\n<gray>Il Paese da cui ti connetti "<light_purple>{GEO_COUNTRY}</light_purple>" è vietato su questo server.</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Modulo: Paese</dark_gray>'
      asn: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>La tua connessione è stata rifiutata perché VPN o Proxy.\n<gray>Il Provider Internet ASN "<light_purple>{GEO_ASN}</light_purple>" è un fornitore noto di VPN o Tor.</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Modulo: ASN</dark_gray>'
      # Alcuni segnaposto non funzionano in questo messaggio perché è usato per espellere
      # il giocatore quando tenta di connettersi e il suo IP è ancora in verifica
      # in un controllo preliminare. Questo evita verifiche duplicate fino a quando
      # la precedente non è completata.
      checking: '<red><bold>✘</bold> Sei stato bloccato da <bold>FoxGate AntiVPN</bold>:\n\n<white>Stiamo verificando la tua connessione.\n<gray>FoxGate sta scansionando la tua connessione, attendi qualche secondo.</gray>\n\n<gold>È un errore?</gold> <white>Entra nel nostro server discord.\n<aqua><underlined>discord.idcteam.xyz'
   # Notifica quando un giocatore viene espulso. Puoi disattivare il messaggio lasciandolo vuoto.
   notify:
      vpn: '{prefix} <aqua>{player} <gray>è stato rilevato con un VPN ed è stato espulso! <green>({IP})'
      isp: '{prefix} <aqua>{player} <gray>è stato espulso per essersi connesso con un ISP in blacklist: <aqua>{ISP}</aqua>! <green>({IP})'
      iprange: '{prefix} <aqua>{player} <gray>è stato espulso per essersi connesso con un IPRange in blacklist! <green>({IP})'
      bogon: '{prefix} <aqua>{player} <gray>ha tentato di connettersi da un IP bogon: <green>{IP}</green>!'
      country: '{prefix} <aqua>{player} <gray>è stato espulso per essersi connesso da un Paese in blacklist: <aqua>{GEO_COUNTRY}</aqua>! <green>({IP})'
      asn: '{prefix} <aqua>{player} <gray>è stato espulso per essersi connesso con un ASN in blacklist: <aqua>{GEO_ASN}</aqua>! <green>({IP})'
   # Messaggio mostrato quando un giocatore è bloccato da un modulo. (Per il comando status)
   blocked:
      isp: '<gold>Bloccato dal suo ISP.'
      iprange: '<gold>Bloccato dal suo IPRange.'
      bogon: '<gold>Bloccato per IP Bogon.'
      country: '<gold>Bloccato dal suo Paese.'
      asn: '<gold>Bloccato dal suo ASN.'
   # Questo comparirà solo in console (utile per debug).
   error: '{prefix} Errore durante la verifica VPN con <aqua>"{service}"</aqua> e <yellow>{player}</yellow>: {error}'
   # Prefisso dei messaggi del plugin.
   prefix: '<yellow><bold>FGT</bold></yellow><dark_gray> ►</dark_gray>'
   help:
      add: 'Aggiungi un IP al database.'
      alts: 'Controlla tutti gli utenti su un IP.'
      check: 'Controlla un IP esterno e salvalo nel database.'
      clearcache: 'Svuota la cache dei nomi salvati.'
      db: 'Pulisci o riconnetti il database.'
      debug: 'Esegui debug di FoxGate nella console.'
      reload: 'Ricarica il file di configurazione.'
      remove: 'Rimuovi un IP dal database.'
      status: 'Visualizza informazioni su un IP salvato nel database.'
      update: 'Aggiorna automaticamente i componenti del plugin.'
      verbose: 'Abilita/disabilita la modalità verbosa.'
      whitelist: 'Metti in whitelist un utente o IP.'
      predebug: '(Premium) Invia un webhook Discord o inoltro Telegram di test.'
   alts:
      invalidip: '{prefix} {IP}<red> non è un IP/Nome valido!'
      invalidcheck: '{prefix} {IP}<red> non possiamo trovare la richiesta IP/utente dalla cache!'
      checking: '{prefix} {IP}<yellow> controllo degli alt...'
      # Qui puoi trovare questi segnaposto:
      #
      # {NAME} - Restituisce i nomi del giocatore. (solo per 'output')
      # {IP} - Restituisce l'IP del giocatore.
      # {ISP} - Restituisce l'ISP dell'IP (se è in cache), dal modulo ISP.
      # {ALTS} - Restituisce gli alt dell'Utente/IP.
      # {OUTPUT} - Restituisce il formato di 'output'.
      # {TIME} - Restituisce l'ultima volta. (solo per 'output')
      # {TIME_AGO} - Restituisce il tempo trascorso. (solo per 'output')
      # {GEO_COUNTRY} - Restituisce il Paese dell'IP. (Solo versione premium).
      # {GEO_ASN} - Restituisce l'ASN dell'IP. (Solo versione premium).
      # {SIMILAR} - Mostra simile se trovato con IP dinamico, altrimenti sarà vuoto.
      output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - Ultima connessione: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
      info: ' \n <green>Visualizzo Alt di <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Alt:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Paese: <aqua>{GEO_COUNTRY} \n '
      # Visualizza informazioni sul formato data qui:
      # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
      format: 'dd-MM-yyyy HH:mm:ss'
      day: 'giorno'
      hour: 'ora'
      minute: 'minuto'
      second: 'secondo'
      plural_day: 'giorni'
      plural_hour: 'ore'
      plural_minute: 'minuti'
      plural_second: 'secondi'
      similar: '<click:run_command:"/foxgate alts {IP}"><hover:show_text:"Clicca per vedere gli alt."><gold>[Simile]</gold></hover></click>'
      online: '<click:run_command:"/foxgate status {IP}"><hover:show_text:"Clicca per controllare lo stato."><green>Online</green></hover></click>'
   add_remove:
      invalidip: '{prefix} {IP}<red> non è un IP/Nome valido!'
      already: '{prefix} {IP}<red> è già stato aggiunto/rimosso dal database!'
      add: '{prefix} {IP}<green> è stato aggiunto al database!'
      remove: '{prefix} {IP}<green> è stato rimosso dal database!'
   check:
      invalidip: '{prefix} {IP}<red> non è un IP/Nome valido!'
      cached: '{prefix} {IP}<yellow> è già in cache nel database. Puoi <white><underlined><click:run_command:"/foxgate status {IP}">cliccare qui per vedere le informazioni salvate</click></underlined></white>.'
      checking: '{prefix} <yellow>Controllo <white>{IP}<yellow>...'
      checked: '{prefix} {IP}<green> è stato verificato con successo, visualizza le informazioni con <gray>(/foxgate status)</gray> o <white><underlined><click:run_command:"/foxgate status {IP}">clicca qui</click></underlined></white>.'
      pre-checking: '{prefix} {IP}<yellow> è già in fase di scansione, attendi il risultato prima di rieseguire il controllo.'
   clearcache:
      purging: '{prefix} <white>Stiamo <yellow>svuotando</yellow> la cache...'
      purging_correctly: '{prefix} <green>La cache è stata svuotata.'
      purging_problem: '{prefix} <red>Errore durante la pulizia della cache. Controlla la console.'
   db:
      invalid_usage: '{prefix} Usa il comando <aqua>/foxgate db <purge/reconnect><reset>.'
      reconnecting: '{prefix} <yellow>Tentativo di riconnessione al database...'
      reconnect_correctly: '{prefix} <green>Il database è stato riconnesso.'
      reconnect_problem: '{prefix} <red>Errore durante la riconnessione al database. Controlla la console.'
      purging: '{prefix} <yellow>Tentativo di pulizia del database...'
      purging_correctly: '{prefix} <green>Il database è stato svuotato.'
      purging_problem: '{prefix} <red>Errore durante la pulizia del database. Controlla la console.'
   debug:
      enable: '{prefix} <green>Modalità debug attivata. Controlla la console.'
      disable: '{prefix} <red>Modalità debug disattivata.'
   reload:
      message: '{prefix} <green>Il file di configurazione è stato ricaricato.'
   status:
      invalidip: '{prefix} {IP}<red> non è un IP valido!'
      # Qui puoi trovare nuovi segnaposto solo per questo messaggio:
      #
      # {DETECTED} - Restituisce solo i servizi che hanno rilevato una VPN con un IP.
      # {UNDETECTED} - Restituisce solo i servizi che non hanno rilevato una VPN con un IP.
      # {LIST} - Restituisce entrambe le liste, ma con colori diversi (personalizzabili).
      # {MAX} - Restituisce il numero massimo di flag richiesti per negare l'accesso a un giocatore.
      # {COUNT_DETECTED} - Restituisce il numero di servizi che hanno rilevato l'IP di un giocatore.
      # {COUNT_UNDETECTED} - Restituisce il numero di servizi che non hanno rilevato l'IP di un giocatore.
      # {STATUS} - Restituisce lo stato del giocatore.
      # {ISP} - Restituisce l'ISP dell'IP, (se è in cache/IP), dal modulo ISP.
      # {HOSTNAME} - Restituisce l'Hostname dell'IP, (se è in cache/IP), dal modulo ISP.
      # {GEO_COUNTRY} - Restituisce il Paese del giocatore. (Solo versione premium).
      # {GEO_ASN} - Restituisce l'ASN del giocatore (Solo versione premium).
      detected: '<red>'
      undetected: '<green>'
      none: '<red>Nessuno.'
      no_cached: '<red>Non in cache nel database.'
      allow: '<green>Verificato.'
      deny: '<red>Bloccato.'
      saved: '<yellow>Scansionato.'
      info: ' \n <green>Stato di <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Hostname: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>Stato: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>Non rilevato: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>Rilevato: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>Servizi: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Paese: <aqua>{GEO_COUNTRY} \n '
   update:
      invalid_usage: '{prefix} Usa il comando <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>.'
      already_downloading: '{prefix} <red>Stiamo già scaricando un file...'
      backend_down: '{prefix} <red>Il nostro backend sembra essere giù o instabile. Non possiamo aggiornare e completare la richiesta.'
      invalid_license: '{prefix} <red>La tua licenza non è valida, inserisci una chiave valida per questa azione.'
      downloading_asn: '{prefix} <yellow>Scaricando ASN...'
      downloading_ranges: '{prefix} <yellow>Scaricando Range...'
      downloading_hostnames: '{prefix} <yellow>Scaricando Hostname...'
      downloading_jar: '{prefix} <yellow>Scaricando plugin...'
      downloaded_asn: '{prefix} <green>Scaricato l'ultimo ASN dal nostro backend/centrale. Modifiche già applicate.'
      downloaded_ranges: '{prefix} <green>Scaricati gli ultimi Range dal nostro backend/centrale. Modifiche già applicate.'
      downloaded_hostnames: '{prefix} <green>Scaricati gli ultimi Hostname dal nostro backend/centrale. Modifiche già applicate.'
      downloaded_jar: '{prefix} <green>Scaricato l'ultimo JAR dal nostro backend/centrale. Riavvia il server per applicare le modifiche.'
   verbose:
      enable: '{prefix} <green>Hai attivato la modalità verbosa.'
      disable: '{prefix} <red>Hai disattivato la modalità verbosa.'
      # Qui puoi trovare nuovi segnaposto solo per questo messaggio:
      #
      # {PLAYER} - Restituisce il nome del giocatore.
      # {IP} - Restituisce l'IP del giocatore.
      # {SERVICE} - Restituisce il nome del servizio.
      # {FLAGS} - Restituisce il numero attuale di Flag.
      # {FLAGS_ADDED} - Restituisce il numero di Flag aggiunti.
      # {MAXFLAGS} - Restituisce il numero di Flag per essere rilevato.
      no_malicious: '{prefix} <green>[VERBOSE] <aqua>{player} <gray>non è un VPN con il servizio: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flag:</gray><red>{FLAGS}</red><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
      malicious: '{prefix} <red>[VERBOSE] <aqua>{player} <gray>è stato segnalato come VPN con il servizio: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flag:</gray><red>{FLAGS}</red><green>(+{FLAGS_ADDED})</green><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
      ignored: '{prefix} <yellow>[VERBOSE] <aqua>{player} <gray>è stato ignorato perché in whitelist in <green>{type} <dark_gray>({IP})'
   whitelist:
      invalid_usage: '{prefix} Usa il comando <dark_gray>''''</dark_gray>/fg whitelist <green><add/remove/info/purge></green> <yellow>[nome/ip]</yellow> <aqua>[motivo]</aqua> <light_purple>[tempo]</light_purple><dark_gray>''''</dark_gray><reset>.'
      already: '{prefix} {IP}<red> è già in whitelist/non in whitelist nella config!'
      whitelisted: '{prefix} {IP}<green> è stato aggiunto in whitelist nella config con tipo <white>{type}</white> per <white>{time}</white>. Puoi <white><underlined><click:run_command:"/foxgate whitelist remove {IP}">cliccare qui per rimuoverlo</click></underlined></white>.'
      unwhitelisted: '{prefix} {IP}<green> è stato rimosso dalla whitelist nella config con tipo <white>{type}</white>. Puoi <white><underlined><click:run_command:"/foxgate whitelist add {IP}">cliccare qui per aggiungerlo di nuovo</click></underlined></white>.' 
      type_ip: 'IP'
      type_name: 'Nome'
      problem: '{prefix} <red>Errore durante l'aggiunta/rimozione dalla whitelist. Controlla la console.'
      invalid_time: '{prefix} <red>Formato tempo non valido. Usa epoch o formati come <white>1d</white>, <white>3h</white>, <white>15m</white>, <white>30s</white> o <white>permanente</white>.'
      purging: '{prefix} <yellow>Tentativo di svuotamento della whitelist...'
      purging_correctly: '{prefix} <green>La whitelist è stata svuotata.'
      purging_problem: '{prefix} <red>Errore durante lo svuotamento della whitelist. Controlla la console.'      
      # Qui puoi trovare nuovi segnaposto solo per questo messaggio:
      #
      # {TYPE} - Restituisce "IP"/"Nome".
      # {REASON} - Restituisce il motivo per cui questo nome/IP è in whitelist.
      # {EXPIRATION} - Restituisce il tempo di scadenza.
      # {ISP} - Restituisce l'ISP dell'IP (se è in cache), dal modulo ISP.
      # {HOSTNAME} - Restituisce l'Hostname dell'IP (se è in cache), dal modulo ISP.
      # {GEO_COUNTRY} - Restituisce il Paese del giocatore (Premium e funziona solo abilitando la funzione).
      # {GEO_ASN} - Restituisce l'ASN del giocatore (Premium e funziona solo abilitando la funzione).
      info: ' \n <green>Informazioni whitelist di <aqua>{IP}\n <dark_gray>▪ <white>Tipo: <gold>{TYPE}</gold> \n <dark_gray>▪ <white>Motivo: <yellow>{REASON}</yellow>\n <dark_gray>▪ <white>Scadenza: <light_purple>{EXPIRATION}</light_purple>\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Paese: <aqua>{GEO_COUNTRY} \n '
      # Visualizza informazioni sul formato data qui:
      # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
      format: 'dd-MM-yyyy HH:mm:ss'
      permanent: 'Permanente.'
      noreason: 'Nessun motivo.'
      nowhitelist: '{prefix} {IP}<red> non è salvato in whitelist con tipo <white>{type}</white>.'
   predebug:
      invalid_usage: '{prefix} Usa il comando <aqua>/fg <dwdebug/tgdebug> <green><allow/deny/country/asn/isp></green><reset>.'
      sending: '{prefix} <yellow>Invio test per <white>{type}</white> in modalità <white>{mode}</white>...</yellow>'
      sended: '{prefix} <green>Inviato!'
      problem: '{prefix} <red>Errore durante l'invio del debug di <white>{type}</white>!'
