    text: 'FoxGate: High Quality AntiVPN%nl%%nl%Player ''{NAME}'' ({IP}) has been blocked by FoxGate for a result of {COUNT_DETECTED}/{MAX} detected services.%nl%%nl%- Detected in ({COUNT_DETECTED}): {DETECTED}%nl%- Undetected in ({COUNT_UNDETECTED}): {UNDETECTED}%nl%- Country: {GEO_COUNTRY}%nl%- ASN: {GEO_ASN}'

