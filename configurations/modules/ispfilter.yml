#
# Limit connections and/or allow bypass if a player is using
# an allowed or disallowed ISP.
# This feature works by downloading a file from Zowi Central/IPInfo/
# IPLocate containing a list of ISPs based on their IP addresses.
#
# 📚 Note: This is a Lite "ASN" module, you could purchase our
# Plus Edition for a complete and perfect alternative of this.
# The complete module, works with MaxMind DB, which works faster,
# more optimized, complete list of IP's, extensive support, etc.
#
# ❓ Still questions? Join to the discord server:
# - https://discord.zowi.gay/
# - https://discord.idcteam.xyz/
#
# 💼 GitHub:
# https://github.com/IDCTeam-Group/FoxGate-Issues/wiki/Configuration#2-how-to-configure-the-module-isp-provider-detection-lite-asn-module

# 🔗 Select the site for downloading the file.
# - Use your favorite provider for downloading the
#   database 'for ISP Module'. Follow and see the
#   instructions of every provider in case it's
#   required.
provider:

    #
    #  🚩 DISABLE
    #     Use this value for disable ISP Module in case
    #     you don't need this feature.
    #
    #  💼 ZC (Zowi's Central)
    #  🧩 ZCL (IPLocate alternative)
    #     Download the database from 'Zowi Central', this
    #     option could be unstable sometimes, for their
    #     web-hosting. The database it's updated every 12
    #     hours automatically.
    #     ⭐ Recommended in case it's first setup or you
    #       reached ratelimit from 'IPInfo'.
    #     🔗 https://central.zowi.gay/
    #
    #  💼 IPInfo
    #     Download the database from IPInfo, this is
    #     the real provider, which offers stable download
    #     of the database. A key it's required for this.
    #     ⭐ Recommended in case you want stability and
    #       has a key.
    #     🔗 https://ipinfo.io/
    #
    #  💼 IPLocate
    #     Download the database from IPLocate, this is
    #     the alternative provider, which offers other type
    #     of the database. A key it's required for this.
    #     ⭐ Recommended in case you want alternative and
    #       has a key.
    #     🔗 https://iplocate.io/
    #
    #  💼 Custom
    #     You can make your own hosting for downloading the
    #     database? Put a custom URL for making it downloading,
    #     but, needs to follow some requeriments.
    #     ⚠ Requeriments:
    #        - Needs to be a '.mmdb' file.
    #        - Needs to be descompressed.
    #        - Needs to follow IPInfo format.
    #        - Needs to return file size in header (avoid issues).
    #        - Needs to be HTTPS always.
    #        - Needs to return status 200.
    #
    # If you has questions about this selection, please,
    # join to our discord server.
    # ➡ https://discord.zowi.gay/
    use: ZC

    # 🚩 Fallback API in case the primary fails.
    fallback:
    - IPInfo
    - ZCL
    - IPLocate

    # Configuration in case it's being using IPInfo.
    # 🔗 https://ipinfo.io/
    ipinfo:

        # 🔑 Enter here your key of IPInfo.
        # - Insert your key from IPInfo (https://ipinfo.io/) in case you
        #   don't want to use Zowi's Central for downloading the database.
        #   This option it's extremely recommended.
        #
        # 💼 GitHub:
        # https://github.com/IDCTeam-Group/FoxGate-Issues/wiki/Configuration#-how-to-setup-it
        key: ''

    # Configuration in case it's being using IPLocate.
    # 🔗 https://iplocate.io/
    iplocate:

        # 🔑 Enter here your key of IPLocate.
        # - Insert your key from IPLocate (https://iplocate.io/) in case you
        #   don't want to use IPInfo for the database.
        key: ''

    # Configuration in case you're sure to use one Custom.
    # 📚 Note: Follow the requeriments from the description.
    custom:

        # 🔗 Put the URL from were download this database.
        url: ''

# ⏳ How often to update the database (in hours)?
# - Determine the time for downloading a new version
#   of the database for always use up-to-date infomration
#   and for avoid ratelimit.
#
#   ➡ Use 'DISABLE' for disable the update.
#
# 📚 Note: FoxGate checks the file every 2 hours
# automatically or when the command '/fg reload' it's
# used. If the file it's older than this value,
# this will be updated.
update: '12'

# 📚 Configure the method to obtain hostnames.
hostnames:
    # 🚩 Enable detection with hostnames?
    enable: true

    # 📁 Check hostname using Reverse DNS?
    # - Could has delay for checking, but with a perfect
    #   resolver could reduce a lot the delay. It's perfect
    #   use this to has efficient and accurate detection
    #   of the hostnames.
    #
    # 📚 Note: Not using this method, will go to use
    # InetAddress#getCanonicalHostName which it's faster
    # but could fail in obtaining hostnames.
    reverse_dns: false
    # 🌎 Resolver to use.
    # - Setting a correctly resolver, will increase
    #   the speed of obtaining the hostname. Chooise
    #   one and test with multiple IP's to determine
    #   the last decision.
    #
    # 🦊 Zowi gives to you: some DNS for using like reverse,
    # YAY! (IPv4, better found IPv6 DNS if you're using it)
    # - 8.8.8.8 (Google Primary DNS)
    # - 8.8.4.4 (Google Secondary DNS)
    # - 1.1.1.1 (Cloudflare Primary DNS)
    # - 1.0.0.1 (Cloudflare Secondary DNS)
    # - 9.9.9.9 (Quad9 Primary DNS)
    # - 149.112.112.112 (Quad9 Secondary DNS)
    # - 208.67.222.222 (OpenDNS Primary DNS)
    # - 208.67.220.220 (OpenDNS Secondary DNS)
    #
    #  For russian people:
    # - 77.88.8.8 (Yandex Primary DNS)
    # - 77.88.8.1 (Yandex Secondary DNS)
    resolver: 1.1.1.1
    # ⌛ Timeout for resolver.
    # - Determine a timeout for a resolver,
    #   useful to prevent stuck in a checking for
    #   detect the hostname. Increase for allow
    #   more opportunity to the plugin in obtain
    #   with ReverseDNS. Use milliseconds.
    #
    # ⭐ Recommended: 2000
    timeout: 300

# Bypass detections of FoxGate.
bypass:

    # 🚩 Add the list of ISP(s) allowed for bypass detections
    # of VPN in FoxGate. Use the value "[]" to disable, like:
    #
    #  list: []
    #
    # 📚 Example of this configuration.
    #
    # list:
    # - "Cloudflare, Inc."
    # - "Google LLC"
    list: [
        ]
    # 📁 Works like the option from above, but using hostname.
    # Use list format to put a hostname or disabling feature.
    hostnames:
    - one.one.one.one

    # 👤 Blacklist the bypass to these name's.
    blacklist_name:
    - ImZowi
    - ImLowiii
    # 👤 Blacklist the bypass to these IP's.
    blacklist_ip:
    - 127.0.0.1

# Whitelist/blacklist connections from X ISPs.
# The player is blocked from joining but the IP doesn't get verified!
blocker:

    # 🧰 Define the type of usage to this list.
    # - 'whitelist': Allow the access to certain ISPs.
    # - 'blacklist': Deny the access in certain ISPs.
    type: blacklist

    # 📁 Add the list of ISP names for block/allow connections
    # to the server. Use the value "[]" to disable, like:
