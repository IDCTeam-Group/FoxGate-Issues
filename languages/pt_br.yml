#
# 🔨 Configurar as mensagens dos plugins.
# Você pode usar MiniMessage nesta seção. Também funciona com
# cores legacy do Bukkit, mas não é recomendado devido a
# incompatibilidades.
# PlaceholderAPI também é suportado.
#
# 📷 Visualizador:
# https://webui.advntr.dev/
#
# 📚 Formato:
# https://docs.papermc.io/adventure/minimessage/format/
message:

    # Mensagem de expulsão quando o plugin bloqueia um jogador.
    #
    # {PLAYER} - Retorna o nome do jogador.
    # {IP} - Retorna o IP do jogador.
    # {UUID} - Retorna o UUID do jogador. (BungeeCord não suporta isso)
    # {ISP} - Retorna o ISP do IP (se estiver em cache), do módulo ISP.
    # {HOSTNAME} - Retorna o Hostname do IP (se estiver em cache), do módulo ISP.
    # {COUNTRY} - Retorna o país do jogador. (Apenas versão premium).
    # {ASN} - Retorna o ASN do jogador. (Apenas versão premium).
    kick:
        vpn: '<red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Sua conexão foi negada por ser VPN ou Proxy.\n<gray>Tente desativar primeiro sua VPN/proxy antes de entrar.</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: Serviços</dark_gray>'
        iplimiter: '<red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Sua conexão foi negada para entrada.\n<gray>Encontramos muitas conexões no mesmo IP.</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: IPLimiter</dark_gray>'
        isp: '<red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Sua conexão foi negada por ser maliciosa.\n<gray>O Provedor de Internet "<light_purple>{ISP}</light_purple>" que você usa é proibido neste servidor.</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: ISPFilter</dark_gray>'
        iprange: '<red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Sua conexão foi negada por ser maliciosa.\n<gray>O IP está em uma blacklist em nosso banco de dados por estar em uma faixa maliciosa.</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: IPRange</dark_gray>'
        bogon: '<red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Sua conexão foi negada por ser bogon.\n<gray>O IP é considerado bogon (rede privada).</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz'
        country: '<red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Sua conexão foi negada por ser maliciosa.\n<gray>O país de onde você está se conectando "<light_purple>{COUNTRY}</light_purple>" é proibido neste servidor.</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: País</dark_gray>'
        asn: '<red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Sua conexão foi negada por ser VPN ou Proxy.\n<gray>O Provedor de Internet ASN "<light_purple>{ASN}</light_purple>" é um provedor conhecido de VPN ou Tor.</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: ASN</dark_gray>'
        # Alguns placeholders não funcionam nesta mensagem porque é usada para expulsar
        # o jogador quando ele tenta entrar e seu IP ainda está sendo verificado em
        # uma pré-verificação. Isso evita verificações duplicadas até que a
        # anterior esteja completa.
        checking: <red><bold>✘</bold> Você foi bloqueado pelo <bold>FoxGate AntiVPN</bold>:\n\n<white>Estamos verificando sua conexão.\n<gray>FoxGate está escaneando sua conexão, por favor aguarde alguns segundos.</gray>\n\n<gold>Isso é um erro?</gold> <white>Entre no nosso servidor do discord.\n<aqua><underlined>discord.idcteam.xyz
    # Notificação quando um jogador é expulso. Você pode prevenir esta mensagem deixando-a em branco.
    notify:
        vpn: '{prefix} <aqua>{player} <gray>foi detectado usando uma VPN e foi expulso! <green>({IP})'
        isp: '{prefix} <aqua>{player} <gray>foi expulso por entrar com um ISP na blacklist: <aqua>{ISP}</aqua>! <green>({IP})'
        iprange: '{prefix} <aqua>{player} <gray>foi expulso por entrar com um IPRange na blacklist! <green>({IP})'
        bogon: '{prefix} <aqua>{player} <gray>tentou entrar de um IP bogon: <green>{IP}</green>!'
        country: '{prefix} <aqua>{player} <gray>foi expulso por entrar com um país na blacklist: <aqua>{COUNTRY}</aqua>! <green>({IP})'
        asn: '{prefix} <aqua>{player} <gray>foi expulso por entrar com um ASN na blacklist: <aqua>{ASN}</aqua>! <green>({IP})'
    # Mensagem para mostrar quando um jogador é bloqueado por um módulo. (Para o comando status)
    blocked:
        isp: <gold>Bloqueado pelo seu ISP.
        iprange: <gold>Bloqueado pelo seu IPRange.
        bogon: <gold>Bloqueado por IP Bogon.
        country: <gold>Bloqueado pelo seu País.
        asn: <gold>Bloqueado pelo seu ASN.
    # Isto só aparecerá no console.
    # Pode ajudar com debug se um serviço não está funcionando corretamente.
    # Você pode prevenir esta mensagem deixando-a em branco.
    error: '{prefix} Erro ao verificar VPN com <aqua>"{service}"</aqua> e <yellow>{player}</yellow>: {error}'
    # Determina o prefixo de mensagem para o plugin.
    prefix: <yellow><bold>FGT</bold></yellow><dark_gray> ►<reset>
    help:
        add: Adicionar um IP ao banco de dados.
        alts: Verificar todos os usuários em um IP.
        check: Verificar um IP externo e salvar no banco de dados.
        clearcache: Limpar o arquivo cache de nomes de usuário salvos.
        db: Purgar ou reconectar o banco de dados.
        debug: Depurar FoxGate no console.
        reload: Recarregar arquivo de configuração.
        remove: Remover um IP do banco de dados.
        status: Ver informações sobre um IP em cache no banco de dados.
        update: Atualizar automaticamente componentes do plugin.
        verbose: Ativar/desativar modo verbose.
        whitelist: Permitir um usuário ou IP.
        predebug: (Premium) Enviar um webhook do discord ou forward do telegram para testar como ficam.
    alts:
        invalidip: '{prefix} {IP}<red> não é um IP/Nome de usuário válido!'
        invalidcheck: '{prefix} {IP}<red> não conseguimos encontrar o IP/usuário solicitado do cache!'
        checking: '{prefix} {IP}<yellow> verificando alts...'
        # Aqui você pode encontrar estes placeholders:
        #
        # {NAME} - Retorna os nomes do jogador. (apenas para 'output')
        # {IP} - Retorna o IP do jogador.
        # {ISP} - Retorna o ISP do IP (se estiver em cache), do módulo ISP.
        # {ALTS} - Retorna os alts do Usuário/IP.
        # {OUTPUT} - Retorna o formato de 'output'.
        # {TIME} - Retorna a última vez. (apenas para 'output')
        # {TIME_AGO} - Retorna o tempo decorrido. (apenas para 'output')
        # {COUNTRY} - Retorna o país do IP. (Apenas versão premium).
        # {ASN} - Retorna o ASN do IP. (Apenas versão premium).
        # {SIMILAR} - Mostra similar se foi encontrado com IP dinâmico, caso contrário estará vazio.
        output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - Última conexão: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
        info: ' \n <green>Vendo Alts de <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Alts:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>País: <aqua>{GEO_COUNTRY} \n '
        # Ver sobre o formato de data aqui:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: dd-MM-yyyy HH:mm:ss
        day: dia
        hour: hora
        minute: minuto
        second: segundo
        plural_day: dias
        plural_hour: horas
        plural_minute: minutos
        plural_second: segundos
        similar: <click:run_command:"/foxgate alts {IP}"><hover:show_text:"Clique para ver alts."><gold>[Similar]</gold></hover></click>
        online: <click:run_command:"/foxgate status {IP}"><hover:show_text:"Clique para verificar status."><green>Online</green></hover></click>
    add_remove:
        invalidip: '{prefix} {IP}<red> não é um IP/Nome de usuário válido!'
        already: '{prefix} {IP}<red> já foi adicionado/removido do banco de dados!'
        add: '{prefix} {IP}<green> foi adicionado ao banco de dados!'
        remove: '{prefix} {IP}<green> foi removido do banco de dados!'
    check:
        invalidip: '{prefix} {IP}<red> não é um IP/Nome de usuário válido!'
        cached: '{prefix} {IP}<yellow> já está em cache no banco de dados. Você pode <white><underlined><click:run_command:"/foxgate status {IP}">clicar aqui para ver a informação salva no banco de dados</click></underlined></white>.'
        checking: '{prefix} <yellow>Verificando <white>{IP}<yellow>...'
        checked: '{prefix} {IP}<green> foi verificado com sucesso, veja a informação obtida no banco de dados com o comando <gray>(/foxgate status)</gray> ou <white><underlined><click:run_command:"/foxgate status {IP}">clique aqui</click></underlined></white>.'
        pre-checking: '{prefix} {IP}<yellow> está sendo escaneado por uma verificação prévia, aguarde os resultados primeiro antes de executar outra neste mesmo IP.'
    clearcache:
        purging: '{prefix} <white>Estamos <yellow>purgando</yellow> o arquivo cache...'
        purging_correctly: '{prefix} <green>O arquivo cache foi purgado.'
        purging_problem: '{prefix} <red>Erro ao tentar purgar o arquivo cache. Verifique o console.'
    db:
        invalid_usage: '{prefix} Use o comando <aqua>/foxgate db <purge/reconnect><reset>.'
        reconnecting: '{prefix} <yellow>Tentando reconectar ao banco de dados...'
        reconnect_correctly: '{prefix} <green>O banco de dados foi reconectado.'
        reconnect_problem: '{prefix} <red>Erro ao tentar reconectar ao banco de dados. Verifique o console.'
        purging: '{prefix} <yellow>Tentando purgar o banco de dados...'
        purging_correctly: '{prefix} <green>O banco de dados foi purgado.'
        purging_problem: '{prefix} <red>Erro ao tentar purgar o banco de dados. Verifique o console.'
    debug:
        enable: '{prefix} <green>Modo debug ativado. Verifique o console.'
        disable: '{prefix} <red>Modo debug desativado.'
    reload:
        message: '{prefix} <green>O arquivo de configuração foi recarregado.'
    status:
        invalidip: '{prefix} {IP}<red> não é um IP válido!'
        # Aqui você pode encontrar novos placeholders apenas para esta mensagem:
        #
        # {DETECTED} - Retorna apenas os serviços que detectaram VPN com um IP.
        # {UNDETECTED} - Retorna apenas os serviços que NÃO detectaram VPN com um IP.
        # {LIST} - Retorna ambas as listas, mas com cores diferentes (personalizáveis).
        # {MAX} - Retorna o número máximo de flags necessários para negar acesso a um jogador.
        # {COUNT_DETECTED} - Retorna o número de serviços que detectaram o IP do jogador.
        # {COUNT_UNDETECTED} - Retorna o número de serviços que NÃO detectaram o IP do jogador.
        # {STATUS} - Retorna o status do jogador.
        # {ISP} - Retorna o ISP do IP (se estiver em cache), do módulo ISP.
        # {HOSTNAME} - Retorna o Hostname do IP (se estiver em cache), do módulo ISP.
        # {GEO_COUNTRY} - Retorna o país do jogador. (Apenas versão premium).
        # {GEO_ASN} - Retorna o ASN do jogador. (Apenas versão premium).
        detected: <red>
        undetected: <green>
        none: <red>Nenhum.
        no_cached: <red>Não está em cache no banco de dados.
        allow: <green>Verificado.
        deny: <red>Bloqueado.
        saved: <yellow>Escaneado.
        info: ' \n <green>Vendo status de <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Hostname: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>Status: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>Não detectados: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>Detectados: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>Serviços: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>País: <aqua>{GEO_COUNTRY} \n '
    update:
        invalid_usage: '{prefix} Use o comando <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>Já estamos baixando um arquivo...'
        backend_down: '{prefix} <red>Nosso backend parece estar fora ou instável. Não podemos atualizar e completar a solicitação.'
        invalid_license: '{prefix} <red>Sua licença não é válida, coloque uma chave válida para esta ação.'
        downloading_asn: '{prefix} <yellow>Baixando ASN...'
        downloading_ranges: '{prefix} <yellow>Baixando Ranges...'
        downloading_hostnames: '{prefix} <yellow>Baixando Hostnames...'
        downloading_jar: '{prefix} <yellow>Baixando plugin...'
        downloaded_asn: '{prefix} <green>Baixado último ASN do nosso backend/central. Mudanças já aplicadas.'
        downloaded_ranges: '{prefix} <green>Baixados últimos Ranges do nosso backend/central. Mudanças já aplicadas.'
        downloaded_hostnames: '{prefix} <green>Baixados últimos Hostnames do nosso backend/central. Mudanças já aplicadas.'
        downloaded_jar: '{prefix} <green>Baixado último JAR do nosso backend/central. Reinicie seu servidor para aplicar mudanças.'
    verbose:
        enable: '{prefix} <green>Você ativou o modo verbose.'
        disable: '{prefix} <red>Você desativou o modo verbose.'
        # Aqui você pode encontrar novos placeholders apenas para esta mensagem:
        #
        # {PLAYER} - Retorna o nome do jogador.
        # {IP} - Retorna o IP do jogador.
        # {SERVICE} - Retorna o nome do serviço.
        # {FLAGS} - Retorna a quantidade atual de Flags.
        # {FLAGS_ADDED} - Retorna a quantidade de Flags adicionados.
        # {MAXFLAGS} - Retorna a quantidade de Flags para ser detectado.
        no_malicious: '{prefix} <green>[VERBOSE] <aqua>{PLAYER} <gray>não é uma VPN com o serviço: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flags:</gray><red>{FLAGS}</red><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        malicious: '{prefix} <red>[VERBOSE] <aqua>{PLAYER} <gray>está marcado como VPN com o serviço: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flags:</gray><red>{FLAGS}</red><green>(+{FLAGS_ADDED})</green><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        ignored: '{prefix} <yellow>[VERBOSE] <aqua>{PLAYER} <gray>foi ignorado por estar permitido em <green>{type} <dark_gray>({IP})'
    whitelist:
        invalid_usage: '{prefix} Use o comando <dark_gray>''''</dark_gray>/fg whitelist <green><add/remove/info/purge></green> <yellow>[nome/ip]</yellow> <aqua>[razão]</aqua> <light_purple>[tempo]</light_purple><dark_gray>''''</dark_gray><reset>.'
        already: '{prefix} {IP}<red> já está permitido/despermitido na configuração!'
        whitelisted: '{prefix} {IP}<green> foi permitido na configuração com tipo <white>{type}</white> por <white>{time}</white>. Você pode <white><underlined><click:run_command:"/foxgate whitelist remove {IP}">clicar aqui para removê-lo novamente</click></underlined></white>.'
        unwhitelisted: '{prefix} {IP}<green> foi despermitido na configuração com tipo <white>{type}</white>. Você pode <white><underlined><click:run_command:"/foxgate whitelist add {IP}">clicar aqui para adicioná-lo novamente</click></underlined></white>.'
        type_ip: IP
        type_name: Nome
        problem: '{prefix} <red>Erro ao tentar adicionar/remover da whitelist. Verifique o console.'
        invalid_time: '{prefix} <red>O formato de tempo é inválido. Use epoch ou formatos como <white>1d</white>, <white>3h</white>, <white>15m</white>, <white>30s</white> ou <white>permanente</white>.'
        purging: '{prefix} <yellow>Tentando purgar a whitelist...'
        purging_correctly: '{prefix} <green>A whitelist foi purgada.'
        purging_problem: '{prefix} <red>Erro ao tentar purgar a whitelist. Verifique o console.'
        # Aqui você pode encontrar novos placeholders apenas para esta mensagem:
        #
        # {TYPE} - Retorna "IP"/"Nome".
        # {REASON} - Retorna a razão pela qual este nome/IP está permitido.
        # {EXPIRATION} - Retorna o tempo de expiração.
        # {ISP} - Retorna o ISP do IP (se estiver em cache), do módulo ISP.
        # {HOSTNAME} - Retorna o Hostname do IP (se estiver em cache), do módulo ISP.
        # {GEO_COUNTRY} - Retorna o país do jogador (Premium e só funciona ativando o recurso).
        # {GEO_ASN} - Retorna o ASN do jogador (Premium e só funciona ativando o recurso).
        info: ' \n <green>Informação de whitelist de <aqua>{IP}\n <dark_gray>▪ <white>Tipo: <gold>{TYPE}</gold> \n <dark_gray>▪ <white>Razão: <yellow>{REASON}</yellow>\n <dark_gray>▪ <white>Expiração: <light_purple>{EXPIRATION}</light_purple>\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>País: <aqua>{GEO_COUNTRY} \n '
        # Ver sobre o formato de data aqui:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: dd-MM-yyyy HH:mm:ss
        permanent: Permanente.
        noreason: Sem razão.
        nowhitelist: '{prefix} {IP}<red> não está salvo na whitelist no tipo <white>{type}</white>.'
    predebug:
        invalid_usage: '{prefix} Use o comando <aqua>/fg <dwdebug/tgdebug> <green><allow/deny/country/asn/isp></green><reset>.'
        sending: '{prefix} <yellow>Enviando para testar seu <white>{type}</white> no modo <white>{mode}</white>...</yellow>'
        sended: '{prefix} <green>Enviado!'
        problem: '{prefix} <red>Erro ao tentar enviar um debug de <white>{type}</white>!'
