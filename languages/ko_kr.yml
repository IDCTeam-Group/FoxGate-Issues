# 🔨 플러그인 메시지 설정
# MiniMessage를 사용할 수 있습니다.
# 기존 Bukkit 색상도 사용 가능하지만 권장되지 않습니다.
# PlaceholderAPI도 지원됩니다.
#
# 📷 뷰어:
# https://webui.advntr.dev/
#
# 📚 형식:
# https://docs.advntr.dev/minimessage/format.html
message:

   # 플러그인이 플레이어를 차단할 때 표시되는 킥 메시지
   #
   # {PLAYER} - 플레이어 이름 반환
   # {IP} - 플레이어 IP 반환
   # {UUID} - 플레이어 UUID 반환 (BungeeCord에서는 지원되지 않음)
   # {ISP} - ISP 모듈에서 IP의 ISP 반환 (캐시된 IP인 경우)
   # {HOSTNAME} - ISP 모듈에서 IP의 호스트명 반환 (캐시된 IP인 경우)
   # {GEO_COUNTRY} - 플레이어 국가 반환 (Premium 버전에서만 작동)
   # {GEO_ASN} - 플레이어 ASN 반환 (Premium 버전에서만 작동)
   kick:
      vpn: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>VPN 또는 프록시로 인해 연결이 거부되었습니다.\n<gray>접속하기 전에 VPN/프록시를 비활성화해주세요.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>모듈: 서비스</dark_gray>'
      iplimiter: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>접속이 거부되었습니다.\n<gray>동일 IP에서 너무 많은 연결이 발견되었습니다.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>모듈: IPLimiter</dark_gray>'
      isp: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>악의적인 연결로 인해 거부되었습니다.\n<gray>사용 중인 인터넷 서비스 공급자 "<light_purple>{ISP}</light_purple>"는 이 서버에서 차단되었습니다.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>모듈: ISPFilter</dark_gray>'
      iprange: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>악의적인 연결로 인해 거부되었습니다.\n<gray>IP는 악의적인 범위에 있어 데이터베이스에서 블랙리스트 처리되었습니다.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>모듈: IPRange</dark_gray>'
      bogon: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>Bogon IP로 인해 거부되었습니다.\n<gray>IP는 Bogon (사설 네트워크)으로 간주됩니다.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz'
      country: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>악의적인 연결로 인해 거부되었습니다.\n<gray>접속하는 국가 "<light_purple>{GEO_COUNTRY}</light_purple>"는 이 서버에서 차단되었습니다.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>모듈: 국가</dark_gray>'
      asn: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>VPN 또는 프록시로 인해 거부되었습니다.\n<gray>인터넷 서비스 공급자 ASN "<light_purple>{GEO_ASN}</light_purple>"는 알려진 VPN 또는 Tor 제공자입니다.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>모듈: ASN</dark_gray>'
      # 일부 플레이스홀더는 이 메시지에서 작동하지 않습니다. 
      # 플레이어가 접속을 시도하고 IP가 사전 확인 중일 때 사용되며,
      # 이전 확인이 완료될 때까지 중복 확인을 방지합니다.
      checking: '<red><bold>✘</bold> <bold>FoxGate AntiVPN</bold>에 의해 차단되었습니다:\n\n<white>연결을 확인 중입니다.\n<gray>FoxGate가 연결을 스캔하고 있습니다. 잠시 기다려주세요.</gray>\n\n<gold>오류인가요?</gold> <white>디스코드 서버에 참여하세요.\n<aqua><underlined>discord.idcteam.xyz'
   # 플레이어 킥 시 알림 메시지
   notify:
      vpn: '{prefix} <aqua>{player} <gray>가 VPN 사용으로 차단되었습니다! <green>({IP})'
      isp: '{prefix} <aqua>{player} <gray>가 블랙리스트 ISP 사용으로 차단되었습니다: <aqua>{ISP}</aqua>! <green>({IP})'
      iprange: '{prefix} <aqua>{player} <gray>가 블랙리스트 IPRange 사용으로 차단되었습니다! <green>({IP})'
      bogon: '{prefix} <aqua>{player} <gray>가 Bogon IP에서 접속을 시도했습니다: <green>{IP}</green>!'
      country: '{prefix} <aqua>{player} <gray>가 블랙리스트 국가로 차단되었습니다: <aqua>{GEO_COUNTRY}</aqua>! <green>({IP})'
      asn: '{prefix} <aqua>{player} <gray>가 블랙리스트 ASN으로 차단되었습니다: <aqua>{GEO_ASN}</aqua>! <green>({IP})'
   # 모듈에 의해 차단된 플레이어 표시 메시지 (상태 명령어용)
   blocked:
      isp: '<gold>ISP에 의해 차단됨.'
      iprange: '<gold>IPRange에 의해 차단됨.'
      bogon: '<gold>Bogon IP로 차단됨.'
      country: '<gold>국가에 의해 차단됨.'
      asn: '<gold>ASN에 의해 차단됨.'
   # 콘솔에서만 표시되는 에러 메시지
   # 서비스가 제대로 작동하지 않을 때 디버그에 도움이 될 수 있습니다.
   # 비워두면 이 메시지를 표시하지 않습니다.
   error: '{prefix} {player}의 VPN 확인 중 <aqua>"{service}"</aqua>에서 오류 발생: {error}'
   # 플러그인 메시지 접두사
   prefix: <yellow><bold>FGT</bold></yellow><dark_gray> ►</dark_gray>
   help:
      add: IP를 데이터베이스에 추가합니다.
      alts: 하나의 IP에 있는 모든 사용자를 확인합니다.
      check: 외부 IP를 확인하고 데이터베이스에 저장합니다.
      clearcache: 저장된 사용자 이름 캐시를 삭제합니다.
      db: 데이터베이스 초기화 또는 재연결
      debug: 콘솔에서 FoxGate 디버깅
      reload: 설정 파일 다시 불러오기
      remove: IP를 데이터베이스에서 제거
      status: 데이터베이스에 저장된 IP 정보 보기
      update: 플러그인 구성 요소 자동 업데이트
      verbose: 상세 모드 활성화/비활성화
      whitelist: 사용자 또는 IP 화이트리스트 등록
      predebug: (Premium) Discord/Webhook/Telegram 테스트
   alts:
      invalidip: '{prefix} {IP}<red> 유효하지 않은 IP/사용자 이름입니다!'
      invalidcheck: '{prefix} {IP}<red> 캐시에서 요청된 IP/사용자를 찾을 수 없습니다!'
      checking: '{prefix} {IP}<yellow> 대체 계정 확인 중...'
      # 여기에서 이 플레이스홀더를 찾을 수 있습니다:
      #
      # {NAME} - 플레이어 이름을 반환합니다 ('output' 전용)
      # {IP} - 플레이어 IP를 반환합니다
      # {ISP} - IP의 ISP를 반환합니다 (캐시된 경우), ISP 모듈에서
      # {ALTS} - 사용자/IP의 대체 계정을 반환합니다
      # {OUTPUT} - 'output' 형식을 반환합니다
      # {TIME} - 마지막 시간을 반환합니다 ('output' 전용)
      # {TIME_AGO} - 경과 시간을 반환합니다 ('output' 전용)
      # {GEO_COUNTRY} - IP의 국가를 반환합니다 (Premium 버전 전용)
      # {GEO_ASN} - IP의 ASN을 반환합니다 (Premium 버전 전용)
      # {SIMILAR} - 동적 IP로 발견된 경우 유사한 항목을 표시하며, 그렇지 않으면 비어 있습니다
      output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - 마지막 연결: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
      info: ' \n <green><aqua>{IP}</aqua>의 대체 계정 확인\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>대체 계정:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN}</yellow> \n <dark_gray>▪ <white>국가: <aqua>{GEO_COUNTRY}</aqua> \n '
      # 날짜 형식 보기:
      # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
      format: 'yyyy-MM-dd HH:mm:ss'
      day: '일'
      hour: '시간'
      minute: '분'
      second: '초'
      plural_day: '일'
      plural_hour: '시간'
      plural_minute: '분'
      plural_second: '초'
      similar: '<click:run_command:"/foxgate alts {IP}"><hover:show_text:"대체 계정을 보려면 클릭"><gold>[유사]</gold></hover></click>'
      online: '<click:run_command:"/foxgate status {IP}"><hover:show_text:"상태를 확인하려면 클릭"><green>온라인</green></hover></click>'
   add_remove:
      invalidip: '{prefix} {IP}<red> 유효하지 않은 IP/사용자 이름입니다!'
      already: '{prefix} {IP}<red> 이미 데이터베이스에 추가/제거됨!'
      add: '{prefix} {IP}<green> 데이터베이스에 추가됨!'
      remove: '{prefix} {IP}<green> 데이터베이스에서 제거됨!'
   check:
      invalidip: '{prefix} {IP}<red> 유효하지 않은 IP/사용자 이름입니다!'
      cached: '{prefix} {IP}<yellow> 이미 데이터베이스에 캐시됨. <white><underlined><click:run_command:"/foxgate status {IP}">여기 클릭</click></underlined></white>하여 정보 확인 가능.'
      checking: '{prefix} <yellow>{IP} 확인 중...'
      checked: '{prefix} {IP}<green> 확인 완료. /foxgate status 명령어 또는 <white><underlined><click:run_command:"/foxgate status {IP}">클릭</click></underlined></white>하여 정보 확인 가능.'
      pre-checking: '{prefix} {IP}<yellow> 이전 스캔 진행 중, 결과 완료 후 다시 시도하세요.'
   clearcache:
      purging: '{prefix} <white>캐시 파일 삭제 중...'
      purging_correctly: '{prefix} <green>캐시 파일 삭제 완료.'
      purging_problem: '{prefix} <red>캐시 파일 삭제 중 오류 발생. 콘솔 확인 필요.'
   db:
      invalid_usage: '{prefix} 명령어 사용법: /foxgate db <purge/reconnect>'
      reconnecting: '{prefix} <yellow>데이터베이스 재연결 중...'
      reconnect_correctly: '{prefix} <green>데이터베이스 재연결 성공.'
      reconnect_problem: '{prefix} <red>데이터베이스 재연결 중 오류 발생. 콘솔 확인 필요.'
      purging: '{prefix} <yellow>데이터베이스 삭제 중...'
      purging_correctly: '{prefix} <green>데이터베이스 삭제 완료.'
      purging_problem: '{prefix} <red>데이터베이스 삭제 중 오류 발생. 콘솔 확인 필요.'
   debug:
      enable: '{prefix} <green>디버그 모드 활성화.'
      disable: '{prefix} <red>디버그 모드 비활성화.'
   reload:
      message: '{prefix} <green>설정 파일 재로드 완료.'
   status:
      invalidip: '{prefix} {IP}<red> 유효하지 않은 IP입니다!'
      # 이 메시지에서만 사용 가능한 새로운 플레이스홀더:
      #
      # {DETECTED} - IP로 VPN을 감지한 서비스만 반환
      # {UNDETECTED} - IP로 VPN을 감지하지 않은 서비스만 반환
      # {LIST} - 다른 색상으로 두 목록 모두 반환 (사용자 정의 가능)
      # {MAX} - 플레이어 접속을 거부하는 데 필요한 최대 플래그 수 반환
      # {COUNT_DETECTED} - 플레이어 IP가 감지된 서비스 수 반환
      # {COUNT_UNDETECTED} - 플레이어 IP가 감지되지 않은 서비스 수 반환
      # {STATUS} - 플레이어 상태 반환
      # {ISP} - ISP 모듈에서 IP의 ISP 반환 (캐시된 IP인 경우)
      # {HOSTNAME} - ISP 모듈에서 IP의 호스트명 반환 (캐시된 IP인 경우)
      # {GEO_COUNTRY} - 플레이어 국가 반환 (Premium 버전에서만 작동)
      # {GEO_ASN} - 플레이어 ASN 반환 (Premium 버전에서만 작동)
      detected: '<red>'
      undetected: '<green>'
      none: '<red>없음.'
      no_cached: '<red>데이터베이스에 없음.'
      allow: '<green>확인 완료.'
      deny: '<red>차단됨.'
      saved: '<yellow>스캔됨.'
      info: ' \n <green>{IP} 상태 확인\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>호스트명: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>상태: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>미감지: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>감지: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>서비스: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>국가: <aqua>{GEO_COUNTRY} \n '
   update:
      invalid_usage: '{prefix} 명령어 사용법: <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray>'
      already_downloading: '{prefix} <red>이미 파일을 다운로드 중입니다...'
      backend_down: '{prefix} <red>백엔드가 다운되었거나 불안정합니다. 요청을 업데이트하고 완료할 수 없습니다.'
      invalid_license: '{prefix} <red>라이선스가 유효하지 않습니다. 이 작업을 위해 유효한 키를 입력하세요.'
      downloading_asn: '{prefix} <yellow>ASN 다운로드 중...'
      downloading_ranges: '{prefix} <yellow>범위 다운로드 중...'
      downloading_hostnames: '{prefix} <yellow>호스트명 다운로드 중...'
      downloading_jar: '{prefix} <yellow>플러그인 다운로드 중...'
      downloaded_asn: '{prefix} <green>백엔드/중앙에서 최신 ASN을 다운로드했습니다. 변경 사항이 이미 적용되었습니다.'
      downloaded_ranges: '{prefix} <green>백엔드/중앙에서 최신 범위를 다운로드했습니다. 변경 사항이 이미 적용되었습니다.'
      downloaded_hostnames: '{prefix} <green>백엔드/중앙에서 최신 호스트명을 다운로드했습니다. 변경 사항이 이미 적용되었습니다.'
      downloaded_jar: '{prefix} <green>백엔드/중앙에서 최신 JAR를 다운로드했습니다. 변경 사항을 적용하려면 서버를 재시작하세요.'
   verbose:
      enable: '{prefix} <green>상세 모드가 활성화되었습니다.'
      disable: '{prefix} <red>상세 모드가 비활성화되었습니다.'
      # 이 메시지에서만 사용 가능한 새로운 플레이스홀더:
      #
      # {PLAYER} - 플레이어 이름 반환
      # {IP} - 플레이어 IP 반환
      # {SERVICE} - 서비스 이름 반환
      # {FLAGS} - 현재 플래그 수 반환
      # {FLAGS_ADDED} - 추가된 플래그 수 반환
      # {MAXFLAGS} - 감지되기 위한 플래그 수 반환
      no_malicious: '{prefix} <green>[상세] <aqua>{player} <gray>는 서비스에서 VPN이 아닙니다: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>IP:</gray><yellow>{IP}</yellow> <gray>플래그:</gray><red>{FLAGS}</red><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
