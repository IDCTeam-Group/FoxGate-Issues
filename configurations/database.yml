#
# Configure a database for use.
#
# ❓ Has questions? Join to the discord server:
# - https://discord.zowi.gay/
# - https://discord.idcteam.xyz/
database:

    # ⚙ Determine the type of DataBase will be used.
    # - Available options in type.
    #   All options use HikariCP for better performance.
    #
    #  |=> MySQL
    #  |=> MariaDB
    #  |=> PostgreSQL
    #  |=> SQLite (COULD CAUSE ISSUES IN OLDER VERSIONS!)
    #  |=> H2
    #  |=> JayBird
    #  |=> Custom
    #
    #  -----------------------------------------------------------------------------
    #      Type	  |   Stability	| Performance | Support | Popularity | Concurrence |
    #  -----------------------------------------------------------------------------
    #    MariaDB	  |      4⭐	    |     4⭐	  |    5⭐	|     5⭐	 |     5⭐
    #     MySQL	  |      4⭐	    |     4⭐	  |    5⭐	|     5⭐	 |     4⭐
    #   PostgreSQL |      5⭐	    |     5⭐	  |    4⭐	|     3⭐	 |     5⭐
    #  	 SQLite   |      1⭐        |     3⭐     |    3⭐  |     2⭐    |     4⭐
    #       H2	  |      2⭐	    |     4⭐	  |    3⭐	|     2⭐	 |     1⭐
    #     Jaybird  |      2⭐	    |     2⭐	  |    1⭐	|     1⭐	 |     1⭐
    #
    # 📚 Note: In case you change this configuration and your server is
    # already started, use the command "/foxgate db reconnect" to restart
    # your database without restarting plugin or server. Always remember do
    # "/foxgate reload" before using this command to apply.
    type: H2

    # 🔩 Set the table's name inside the DataBase.
    # - Modify in case you want mantain older stats while using another
    #   new. This can also help in case a conflict occurrs.
    #
    # 📚 Note: If you want restore older stats used in Older versions
    # of FoxGate (1.0.5-pre4 or older), use the next:
    #   - 'vpn_cache'
    table: foxgate

    # 🔩 Save the cache inside the database instead of a file?
    # - Use this only if you want to use multi-proxy or you're sure
    #   this will don't cause problems with your database.
    #
    # 📚 Note: Custom databases are partially supported in this feature.
    cache_database: false

    # 🔩 Enable whitelist based in DataBase?
    # - Set this feature to enabled in case you want to save
    #   whitelist IP's/names in a database instead of a file.
    #   Extremely recommended for Multi-Proxy.
    #
    # 📚 Note: Custom databases are partially supported in this feature.
    whitelist_database: false

    # Configure your settings for each database type.
    databases:

        # Custom section. Use this only if YOU'RE REALLY
        # SURE THAT YOU CAN SETUP BY YOURSELF A DATABASE.
        custom:
            # Determine here the JDBC URL.
            jdbc: ''
            # Use PoolSettings by HikariCP?
            poolsettings: true
            # Put the Driver class of the database.
            driver: ''

        # SQLite. This was re-added recently, we doesn't provide a
        # good support of this for their big limitations. Use H2 instead.
        sqlite:
            file: sqlite.db

        # H2.
        h2:
            file: h2db

        # MariaDB/MySQL databases type. Edit here.
        remote:
            # Set credentials of your database.
            hostname: localhost
            port: 3306
            database: foxav_db
            username: root
            password: password123

            # Custom properties for advanced users.
            # Add any additional properties to fine-tune the connection.
            #
            # 📚 Note: These propieties are based for the usage
            # of MariaDB, which it's better than MySQL. Consider
            # using MariaDB for better results.
            properties:
                sslMode: disabled
                requireSSL: 'false'
                verifyServerCertificate: 'false'
                autoReconnect: 'true'
                useUnicode: 'true'
                characterEncoding: utf8
                serverTimezone: UTC

        # PostgreSQL database type. Edit here.
        postgresql:
            # Set credentials of your database.
            hostname: localhost
            port: 5432
            database: foxav_db
            username: postgres
            password: password123

            # Database connection settings for PostgreSQL.
            # - Adjust these properties to optimize the connection with your PostgreSQL.
            settings:

                # Enables or disables SSL for secure connections.
                # - It is highly recommended to set this to true if your server supports SSL.
                ssl: false
                # Defines the character encoding for the database connection.
                # - Use "UTF-8" to handle multilingual data and ensure compatibility.
                characterEncoding: UTF-8
                # DKeeps idle connections alive.
                tcpKeepAlive: true
                # Application name for debugging or monitoring purposes.
                applicationName: FoxGate
                # Enables optimized binary transfer for certain data types.
                binaryTransfer: true

        # Jaybird settings. Experimental database type.
        jaybird:
            # Set credentials of your database.
            hostname: localhost
            port: 3050
            database: FoxGate.fdb
            username: foxgate
            password: ''

    # Setup your pool configuration for HikariCP.
    poolsettings:

        # The maximum number of connections in the connection pool.
        # - Determines the upper limit of active database connections that can be managed simultaneously.
        # - Setting this too high can overload your database server, while setting it too low can cause delays.
        # Example:
        #   If your server has high traffic and the database can handle it, set this to 10 or higher.
        # ⭐ Recommended: 10
        # 📚 https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
        maximumPoolSize: 10

        # Minimum number of idle connections to maintain in the pool.
        # - The pool will try to maintain this number of idle (inactive) connections ready for use.
        # - Setting this equal to 'maximum-pool-size' creates a fixed-size connection pool,
        #   ensuring consistent resource allocation.
        # Example:
        #   For a server with occasional traffic spikes, set this to half of 'maximum-pool-size'.
        # ⭐ Recommended: 2
        # 📚 https://github.com/brettwooldridge/HikariCP/wiki/About-Pool-Sizing
        minimumIdle: 2

        # Sets the maximum time an idle connection can remain in the pool before being automatically closed.
        # - Connections that remain idle for longer than the configured value will be removed from the pool
        #   and replaced with new connections as needed.
        # - This is useful to free up resources and keep connections "fresh" avoiding possible problems with
        #   stale connections.
        # Example:
        #   For a server with occasional traffic spikes, set this to half of 'maximum-pool-size'.
        # ⭐ Recommended: 600000 (10 minutes)
        idleTimeout: 600000

        # Maximum lifetime of a connection in the pool, in milliseconds.
        # - Connections older than this value will be closed and replaced.
        # - This prevents stale connections from lingering indefinitely and reduces database timeout issues.
        # - Should be at least 30 seconds less than the timeout imposed by the database itself.
        # Example:
        #   If your database timeout is 30 minutes, set this value to 25 minutes (1500000 ms).
        # ⭐ Recommended: 1500000 (25 minutes)
        maximumLifetime: 1500000

        # Frequency of pings to keep the connection alive, in milliseconds.
        # - This prevents connections from being closed due to inactivity (common in many databases or firewalls).
        # - Must be less than 'maximum-lifetime' and greater than 30 seconds (30000 ms).
        # Example:
        #   For long-running servers, a value of 10 minutes (600000 ms) is generally ideal.
        # ⭐ Recommended: 600000 (10 minutes)
        keepaliveTime: 600000

        # The maximum time in milliseconds to wait for a connection from the pool.
        # - If no connection is available within this time, an exception will be thrown.
        # - Setting a low value ensures responsiveness but may cause issues under heavy load.
        # Example:
        #   For most databaases, a value between 3-5 seconds (3000-5000 ms) is ideal.
        # ⭐ Recommended: 5000 (5 seconds)
        connectionTimeout: 5000
