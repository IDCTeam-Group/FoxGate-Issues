#
# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:

    # 🦊 Kick message when the plugin blocks a player.
    #
    # {PLAYER} - Returns the player's name.
    # {IP} - Returns the player's IP.
    # {UUID} - Returns the player's UUID. (BungeeCord doesn't support this)
    # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
    # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
    # {COUNTRY} - Returns the player's country. (Only works with premium version).
    # {ASN} - Return the player's ASN (Only works with premium version).
    kick:
        vpn: '<red><bold>✘</bold> 您已被 <bold>FoxGate AntiVPN</bold> 阻止连接：\n\n<white>您的连接被拒绝，因为您正在使用VPN或代理。\n<gray>请先禁用您的VPN/代理后再尝试加入。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>模块: Services</dark_gray>'
        iplimiter: '<red><bold>✘</bold> 您已被 <bold>FoxGate AntiVPN</bold> 阻止连接：\n\n<white>您的连接被拒绝。\n<gray>我们检测到来自您IP地址的连接过多。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>模块: IPLimiter</dark_gray>'
        isp: '<red><bold>✘</bold> 您已被 <bold>FoxGate AntiVPN</bold> 阻止连接：\n\n<white>您的连接因恶意行为被拒绝。\n<gray>您使用的互联网服务提供商 "<light_purple>{ISP}</light_purple>" 在此服务器上被禁止。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>模块: ISPFilter</dark_gray>'
        iprange: '<red><bold>✘</bold> 您已被 <bold>FoxGate AntiVPN</bold> 阻止连接：\n\n<white>您的连接因恶意行为被拒绝。\n<gray>您的IP地址在我们的数据库中被列入黑名单，属于恶意IP段。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>模块: IPRange</dark_gray>'
        bogon: '<red><bold>✘</bold> 您已被 <bold>FoxGate AntiVPN</bold> 阻止连接：\n\n<white>您的连接被拒绝，因为来自bogon地址。\n<gray>该IP被视为bogon（私有/保留网络）。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz'
        country: '<red><bold>✘</bold> 您已被 <bold>FoxGate AntiVPN</bold> 阻止连接：\n\n<white>您的连接因恶意行为被拒绝。\n<gray>您连接的国家/地区 "<light_purple>{COUNTRY}</light_purple>" 在此服务器上被禁止。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>模块: Country</dark_gray>'
        asn: '<red><bold>✘</bold> 您已被 <bold>FoxGate AntiVPN</bold> 阻止连接：\n\n<white>您的连接被拒绝，因为您正在使用VPN或代理。\n<gray>您的互联网服务提供商（ASN）"<light_purple>{ASN}</light_purple>" 是已知的VPN或Tor提供商。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>模块: ASN</dark_gray>'
        # Some placeholders don't work in this message because it's used to kick
        # the player when they try to join and their IP is still being verified in
        # a pre-check. This prevents duplicate verification until the previous
        # one is complete.
        checking: '<red><bold>✘</bold> 正在等待 <bold>FoxGate AntiVPN</bold> 验证：\n\n<white>我们正在检查您的连接。\n<gray>FoxGate正在扫描您的连接，请稍等几秒钟。</gray>\n\n<gold>这是一个错误吗？</gold> <white>加入我们的Discord服务器。\n<aqua><underlined>discord.idcteam.xyz'
    # 📍 Notification when a player is kicked. You can prevent this message by leaving it blank.
    notify:
        vpn: '{prefix} <aqua>{player} <gray>因使用VPN被踢出！ <green>({IP})'
        isp: '{prefix} <aqua>{player} <gray>因从被禁的ISP连接被踢出： <aqua>{ISP}</aqua>！ <green>({IP})'
        iprange: '{prefix} <aqua>{player} <gray>因从被禁的IP段连接被踢出！ <green>({IP})'
        bogon: '{prefix} <aqua>{player} <gray>尝试从Bogon IP加入： <green>{IP}</green>！'
        country: '{prefix} <aqua>{player} <gray>因从被禁的国家/地区连接被踢出： <aqua>{COUNTRY}</aqua>！ <green>({IP})'
        asn: '{prefix} <aqua>{player} <gray>因从被禁的ASN连接被踢出： <aqua>{ASN}</aqua>！ <green>({IP})'
        #
        # Message to send when player tries to join but it's blocked.
        # Leave empty to disable this thing. Just works {PLAYER} and {IP} placeholders.
        blocked: '{prefix} <aqua>{player} <gray>尝试连接但之前已被阻止。 <green>({IP})'
    # 🔎 Message to show when a player it's blocked by a module. (For status command)
    blocked:
        isp: '<gold>因ISP被阻止。'
        iprange: '<gold>因IP段被阻止。'
        bogon: '<gold>因Bogon IP被阻止。'
        country: '<gold>因国家/地区被阻止。'
        asn: '<gold>因ASN被阻止。'
    # 🧩 This will only show up in the console.
    # This can help with debug in case a service is not working correctly.
    # You can prevent this message by leaving it blank.
    error: '{prefix} 使用 <aqua>"{service}"</aqua> 验证玩家 <yellow>{player}</yellow> 的VPN时出错： {error}'
    # 🪄 Determine the message prefix for the plugin.
    prefix: '<yellow><bold>FGT</bold></yellow><dark_gray> ►<reset>'
    help:
        add: 将IP添加到数据库。
        alts: 检查一个IP上的所有用户。
        check: 检查外部IP并保存到数据库。
        clearcache: 清除保存的用户名缓存文件。
        db: 清理（purge）或重新连接数据库。
        debug: 在控制台中调试FoxGate。
        reload: 重新加载配置文件。
        remove: 从数据库中删除IP。
        status: 查看数据库中缓存的IP信息。
        update: 自动为您更新插件组件。
        verbose: 启用/禁用详细模式。
        whitelist: 将用户或IP加入白名单。
        predebug: （高级版）发送测试消息到Discord webhook或Telegram。
    alts:
        invalidip: '{prefix} {IP}<red> 不是有效的IP地址/用户名！'
        invalidcheck: '{prefix} {IP}<red> 我们在缓存中找不到该IP/用户的请求！'
        checking: '{prefix} {IP}<yellow> 正在检查替代账户...'
        # Here you can find these placeholders:
        #
        # {NAME} - Returns the player's names. (only for 'output')
        # {IP} - Returns the player's IP.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {ALTS} - Returns the alts from the User/IP.
        # {OUTPUT} - Returns the format of 'output'.
        # {TIME} - Returns the last time. (only for 'output')
        # {TIME_AGO} - Returns the last time ago. (only for 'output')
        # {COUNTRY} - Returns the IP's country. (Only works with premium version).
        # {ASN} - Return the IP's ASN (Only works with premium version).
        # {SIMILAR} - Display similar if was found with dynamic IP, otherwise will be blank.
        output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - 最后连接： {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
        info: ' \n <green>查看 <aqua>{IP} 的替代账户\n <dark_gray>▪ <white>ISP： <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>替代账户：\n {ALTS}\n <dark_gray>▪ <white>ASN： <yellow>{GEO_ASN} \n <dark_gray>▪ <white>国家/地区： <aqua>{GEO_COUNTRY} \n '
        # View about the format date here:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: yyyy-MM-dd HH:mm:ss
        day: 天
        hour: 小时
        minute: 分钟
        second: 秒
        plural_day: 天
        plural_hour: 小时
        plural_minute: 分钟
        plural_second: 秒
        similar: '<click:run_command:"/foxgate alts {IP}"><hover:show_text:"点击查看替代账户。"><gold>[相似]</gold></hover></click>'
        online: '<click:run_command:"/foxgate status {IP}"><hover:show_text:"点击检查状态。"><green>在线</green></hover></click>'
    add_remove:
        invalidip: '{prefix} {IP}<red> 不是有效的IP地址/用户名！'
        already: '{prefix} {IP}<red> 已在数据库中/已从数据库中删除！'
        add: '{prefix} {IP}<green> 已添加到数据库！'
        remove: '{prefix} {IP}<green> 已从数据库中删除！'
    check:
        invalidip: '{prefix} {IP}<red> 不是有效的IP地址/用户名！'
        cached: '{prefix} {IP}<yellow> 已缓存在数据库中。您可以 <white><underlined><click:run_command:"/foxgate status {IP}">点击此处查看数据库中保存的信息</click></underlined></white>。'
        checking: '{prefix} <yellow>正在检查 <white>{IP}<yellow>...'
        saving: '{prefix} <yellow><white>{IP}</white> 检查已完成，正在等待数据库保存数据...'
        checked: '{prefix} {IP}<green> 已成功检查，使用命令 <gray>(/foxgate status)</gray> 查看数据库中获取的信息，或 <white><underlined><click:run_command:"/foxgate status {IP}">点击此处</click></underlined></white>。'
        pre-checking: '{prefix} {IP}<yellow> 正在进行先前的扫描，请先等待结果再对此IP运行另一次检查。'
    clearcache:
        purging: '{prefix} <white>正在<yellow>清理</yellow>缓存文件...'
        purging_correctly: '{prefix} <green>缓存文件已成功清理。'
        purging_problem: '{prefix} <red>尝试清理缓存文件时出错。请检查控制台。'
    db:
        invalid_usage: '{prefix} 使用命令 <aqua>/foxgate db <purge/reconnect><reset>。'
        reconnecting: '{prefix} <yellow>尝试重新连接到数据库...'
        reconnect_correctly: '{prefix} <green>数据库已重新连接。'
        reconnect_problem: '{prefix} <red>尝试重新连接到数据库时出错。请检查控制台。'
        purging: '{prefix} <yellow>尝试清理（purge）数据库...'
        purging_correctly: '{prefix} <green>数据库已成功清理。'
        purging_problem: '{prefix} <red>尝试清理数据库时出错。请检查控制台。'
    debug:
        enable: '{prefix} <green>已启用调试模式。请检查控制台。'
        disable: '{prefix} <red>已禁用调试模式。'
    reload:
        message: '{prefix} <green>配置文件已重新加载。'
    status:
        invalidip: '{prefix} {IP}<red> 不是有效的IP地址！'
        # Here you can find new placeholders only for this message:
        #
        # {DETECTED} - Return only the services that detected a VPN with an IP.
        # {UNDETECTED} - Return only the services that didn't detect a VPN with an IP.
        # {LIST} - Return both lists, but with different colors (customizable).
        # {MAX} - Return the maximum number of flags required to deny access to a player.
        # {COUNT_DETECTED} - Return the number of services that a player's IP has been detected with.
        # {COUNT_UNDETECTED} - Return the number of services that a player's IP hasn't been detected with.
        # {STATUS} - Return the status of the player.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
        # {GEO_COUNTRY} - Returns the player's country. (Only works with premium version).
        # {GEO_ASN} - Return the player's ASN (Only works with premium version).
        detected: <red>
        undetected: <green>
        none: <red>无。
        no_cached: <red>未缓存在数据库中。
        allow: <green>已验证。
        deny: <red>已阻止。
        saved: <yellow>已扫描。
        info: ' \n <green>查看 <aqua>{IP} 的状态\n <dark_gray>▪ <white>ISP： <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>主机名： <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>状态： {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>未检测到： <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>检测到： <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>服务： {LIST}\n <dark_gray>▪ <white>ASN： <yellow>{GEO_ASN} \n <dark_gray>▪ <white>国家/地区： <aqua>{GEO_COUNTRY} \n '
    update:
        invalid_usage: '{prefix} 使用命令 <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>。'
        already_downloading: '{prefix} <red>我们已经在下载文件...'
        backend_down: '{prefix} <red>我们的后端似乎宕机或不稳定。无法更新和完成请求。'
        invalid_license: '{prefix} <red>您的许可证无效，请为此操作提供有效密钥。'
        downloading_asn: '{prefix} <yellow>正在下载ASN数据...'
        downloading_ranges: '{prefix} <yellow>正在下载IP段数据...'
        downloading_hostnames: '{prefix} <yellow>正在下载主机名数据...'
        downloading_jar: '{prefix} <yellow>正在下载插件...'
        downloaded_asn: '{prefix} <green>已从我们的后端下载最新的ASN数据。已应用更改。'
        downloaded_ranges: '{prefix} <green>已从我们的后端下载最新的IP段数据。已应用更改。'
        downloaded_hostnames: '{prefix} <green>已从我们的后端下载最新的主机名数据。已应用更改。'
        downloaded_jar: '{prefix} <green>已从我们的后端下载最新的JAR文件。重新启动服务器以应用更改。'
    verbose:
        enable: '{prefix} <green>您已启用详细模式。'
        disable: '{prefix} <red>您已禁用详细模式。'
        # Here you can find new placeholders only for this message:
        #
        # {PLAYER} - Returns the player's name.
        # {IP} - Returns the player's IP.
        # {SERVICE} - Return the service's name.
        # {FLAGS} - Return the currently amount of Flags.
        # {FLAGS_ADDED} - Return the amount of Flags added.
        # {MAXFLAGS} - Return the amount of Flags for being detected.
        no_malicious: '{prefix} <green>[详细] <aqua>{PLAYER} <gray>根据服务 <aqua>{SERVICE}</aqua> 不是VPN <dark_gray>|</dark_gray> <gray>ip：</gray><yellow>{IP}</yellow> <gray>标记：</gray><red>{FLAGS}</red><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        malicious: '{prefix} <red>[详细] <aqua>{PLAYER} <gray>被服务 <aqua>{SERVICE}</aqua> 标记为VPN <dark_gray>|</dark_gray> <gray>ip：</gray><yellow>{IP}</yellow> <gray>标记：</gray><red>{FLAGS}</red><green>(+{FLAGS_ADDED})</green><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        ignored: '{prefix} <yellow>[详细] <aqua>{PLAYER} <gray>因在白名单中而被忽略 <green>{type} <dark_gray>({IP})'
    whitelist:
        invalid_usage: '{prefix} 使用命令 <dark_gray>''''</dark_gray>/fg whitelist <green><add/remove/info/purge></green> <yellow>[名称/ip]</yellow> <aqua>[原因]</aqua> <light_purple>[时间]</light_purple><dark_gray>''''</dark_gray><reset>。'
        already: '{prefix} {IP}<red> 已在白名单中/未在配置中的白名单中！'
        whitelisting: '{prefix} <yellow>正在保存到白名单： <white>{IP}</white>，请稍候...'
        whitelisted: '{prefix} {IP}<green> 已作为类型 <white>{type}</white> 添加到配置的白名单中，持续时间为 <white>{time}</white>。您可以 <white><underlined><click:run_command:"/foxgate whitelist remove {IP}">点击此处再次将其移除</click></underlined></white>。'
        unwhitelisting: '{prefix} <yellow>正在从白名单中移除： <white>{IP}</white>，请稍候...'
        unwhitelisted: '{prefix} {IP}<green> 已从配置的白名单中移除（类型 <white>{type}</white>）。您可以 <white><underlined><click:run_command:"/foxgate whitelist add {IP}">点击此处再次添加</click></underlined></white>。'
        type_ip: IP
        type_name: 名称
        problem: '{prefix} <red>尝试添加到/从白名单移除时出错。请检查控制台。'
        invalid_time: '{prefix} <red>时间格式无效。使用epoch时间戳或格式如 <white>1d</white>（天）、<white>3h</white>（小时）、<white>15m</white>（分钟）、<white>30s</white>（秒）或 <white>permanent</white>（永久）。'
        purging: '{prefix} <yellow>尝试清理（purge）白名单...'
        purging_correctly: '{prefix} <green>白名单已成功清理。'
        purging_problem: '{prefix} <red>尝试清理白名单时出错。请检查控制台。'
        # Here you can find new placeholders only for this message:
        #
        # {TYPE} - Return "IP"/"Name".
        # {REASON} - Return the reason why this name/IP is whitelisted.
        # {EXPIRATION} - Return the expiration time.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
        # {GEO_COUNTRY} - Return the country player (Premium and only works enabling the feature).
        # {GEO_ASN} - Return the ASN player (Premium and only works enabling the feature).
        info: ' \n <green>查看 <aqua>{IP} 的白名单信息\n <dark_gray>▪ <white>类型： <gold>{TYPE}</gold> \n <dark_gray>▪ <white>原因： <yellow>{REASON}</yellow>\n <dark_gray>▪ <white>过期时间： <light_purple>{EXPIRATION}</light_purple>\n <dark_gray>▪ <white>ASN： <yellow>{GEO_ASN} \n <dark_gray>▪ <white>国家/地区： <aqua>{GEO_COUNTRY} \n '
        # View about the format date here:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: yyyy-MM-dd HH:mm:ss
        permanent: 永久。
        noreason: 无原因。
        nowhitelist: '{prefix} {IP}<red> 未以类型 <white>{type}</white> 保存在白名单中。'
    predebug:
        invalid_usage: '{prefix} 使用命令 <aqua>/fg <dwdebug/tgdebug> <green><allow/deny/country/asn/isp></green><reset>。'
        sending: '{prefix} <yellow>正在以模式 <white>{mode}</white> 发送 <white>{type}</white> 的测试...</yellow>'
        sended: '{prefix} <green>已发送！'
        problem: '{prefix} <red>尝试发送 <white>{type}</white> 的调试信息时出错！'