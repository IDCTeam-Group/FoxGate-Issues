#
# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:

    # 🦊 Kick message when the plugin blocks a player.
    #
    # {PLAYER} - Returns the player's name.
    # {IP} - Returns the player's IP.
    # {UUID} - Returns the player's UUID. (BungeeCord doesn't support this)
    # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
    # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
    # {COUNTRY} - Returns the player's country. (Only works with premium version).
    # {ASN} - Return the player's ASN (Only works with premium version).
    kick:
        vpn: '<red><bold>✘</bold> Je bent geblokkeerd door <bold>FoxGate AntiVPN</bold>:\n\n<white>Je verbinding is geweigerd omdat je een VPN of Proxy gebruikt.\n<gray>Schakel eerst je VPN/proxy uit voordat je deelneemt.</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: Services</dark_gray>'
        iplimiter: '<red><bold>✘</bold> Je bent geblokkeerd door <bold>FoxGate AntiVPN</bold>:\n\n<white>Je verbinding is geweigerd.\n<gray>We hebben te veel verbindingen vanaf hetzelfde IP gevonden.</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: IPLimiter</dark_gray>'
        isp: '<red><bold>✘</bold> Je bent geblokkeerd door <bold>FoxGate AntiVPN</bold>:\n\n<white>Je verbinding is geweigerd omdat deze als kwaadaardig wordt beschouwd.\n<gray>De internetprovider "<light_purple>{ISP}</light_purple>" die je gebruikt, is verboden op deze server.</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: ISPFilter</dark_gray>'
        iprange: '<red><bold>✘</bold> Je bent geblokkeerd door <bold>FoxGate AntiVPN</bold>:\n\n<white>Je verbinding is geweigerd omdat deze als kwaadaardig wordt beschouwd.\n<gray>Je IP staat op een zwarte lijst in onze database omdat het zich in een kwaadaardig IP-bereik bevindt.</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: IPRange</dark_gray>'
        bogon: '<red><bold>✘</bold> Je bent geblokkeerd door <bold>FoxGate AntiVPN</bold>:\n\n<white>Je verbinding is geweigerd omdat deze afkomstig is van een bogon-adres.\n<gray>Het IP wordt beschouwd als een bogon (privé/gereserveerd netwerk).</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz'
        country: '<red><bold>✘</bold> Je bent geblokkeerd door <bold>FoxGate AntiVPN</bold>:\n\n<white>Je verbinding is geweigerd omdat deze als kwaadaardig wordt beschouwd.\n<gray>Het land "<light_purple>{COUNTRY}</light_purple>" van waaruit je verbinding maakt, is verboden op deze server.</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: Country</dark_gray>'
        asn: '<red><bold>✘</bold> Je bent geblokkeerd door <bold>FoxGate AntiVPN</bold>:\n\n<white>Je verbinding is geweigerd omdat je een VPN of Proxy gebruikt.\n<gray>De internetprovider (ASN) "<light_purple>{ASN}</light_purple>" is een bekende VPN- of Tor-provider.</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: ASN</dark_gray>'
        # Some placeholders don't work in this message because it's used to kick
        # the player when they try to join and their IP is still being verified in
        # a pre-check. This prevents duplicate verification until the previous
        # one is complete.
        checking: '<red><bold>✘</bold> In afwachting van verificatie door <bold>FoxGate AntiVPN</bold>:\n\n<white>We controleren je verbinding.\n<gray>FoxGate scant je verbinding, even geduld.</gray>\n\n<gold>Is dit een fout?</gold> <white>Word lid van onze Discord-server.\n<aqua><underlined>discord.idcteam.xyz'
    # 📍 Notification when a player is kicked. You can prevent this message by leaving it blank.
    notify:
        vpn: '{prefix} <aqua>{player} <gray>gebruikte een VPN en is verwijderd! <green>({IP})'
        isp: '{prefix} <aqua>{player} <gray>is verwijderd wegens verbinding met een verboden ISP: <aqua>{ISP}</aqua>! <green>({IP})'
        iprange: '{prefix} <aqua>{player} <gray>is verwijderd wegens verbinding vanuit een verboden IP-bereik! <green>({IP})'
        bogon: '{prefix} <aqua>{player} <gray>probeerde deel te nemen vanaf een bogon-IP: <green>{IP}</green>!'
        country: '{prefix} <aqua>{player} <gray>is verwijderd wegens verbinding vanuit een verboden land: <aqua>{COUNTRY}</aqua>! <green>({IP})'
        asn: '{prefix} <aqua>{player} <gray>is verwijderd wegens verbinding met een verboden ASN: <aqua>{ASN}</aqua>! <green>({IP})'
        #
        # Message to send when player tries to join but it's blocked.
        # Leave empty to disable this thing. Just works {PLAYER} and {IP} placeholders.
        blocked: '{prefix} <aqua>{player} <gray>probeerde verbinding te maken maar was eerder al geblokkeerd. <green>({IP})'
    # 🔎 Message to show when a player it's blocked by a module. (For status command)
    blocked:
        isp: '<gold>Geblokkeerd vanwege hun ISP.'
        iprange: '<gold>Geblokkeerd vanwege hun IP-bereik.'
        bogon: '<gold>Geblokkeerd vanwege Bogon-IP.'
        country: '<gold>Geblokkeerd vanwege hun land.'
        asn: '<gold>Geblokkeerd vanwege hun ASN.'
    # 🧩 This will only show up in the console.
    # This can help with debug in case a service is not working correctly.
    # You can prevent this message by leaving it blank.
    error: '{prefix} Fout bij het verifiëren van VPN met <aqua>"{service}"</aqua> voor <yellow>{player}</yellow>: {error}'
    # 🪄 Determine the message prefix for the plugin.
    prefix: '<yellow><bold>FGT</bold></yellow><dark_gray> ►<reset>'
    help:
        add: Voeg een IP toe aan de database.
        alts: Controleer alle gebruikers op één IP.
        check: Controleer een extern IP en sla op in de database.
        clearcache: Wis het cachebestand van opgeslagen gebruikersnamen.
        db: Database opschonen (purge) of opnieuw verbinden.
        debug: Debug FoxGate in de console.
        reload: Herlaad het configuratiebestand.
        remove: Verwijder een IP uit de database.
        status: Bekijk informatie over een gecacht IP in de database.
        update: Werkt automatisch plug-incomponenten voor je bij.
        verbose: Schakel de uitgebreide modus (verbose) in/uit.
        whitelist: Voeg een gebruiker of IP toe aan de whitelist.
        predebug: (Premium) Stuur een Discord-webhook of Telegram-doorsturing om te testen hoe ze eruitzien.
    alts:
        invalidip: '{prefix} {IP}<red> is geen geldig IP/Gebruikersnaam!'
        invalidcheck: '{prefix} {IP}<red> we kunnen het IP-/gebruikersverzoek niet uit de cache vinden!'
        checking: '{prefix} {IP}<yellow> controleren op alternatieve accounts (alts)...'
        # Here you can find these placeholders:
        #
        # {NAME} - Returns the player's names. (only for 'output')
        # {IP} - Returns the player's IP.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {ALTS} - Returns the alts from the User/IP.
        # {OUTPUT} - Returns the format of 'output'.
        # {TIME} - Returns the last time. (only for 'output')
        # {TIME_AGO} - Returns the last time ago. (only for 'output')
        # {COUNTRY} - Returns the IP's country. (Only works with premium version).
        # {ASN} - Return the IP's ASN (Only works with premium version).
        # {SIMILAR} - Display similar if was found with dynamic IP, otherwise will be blank.
        output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - Laatste verbinding: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
        info: ' \n <green>Bekijk Alts van <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Alts:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Land: <aqua>{GEO_COUNTRY} \n '
        # View about the format date here:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: yyyy-MM-dd HH:mm:ss
        day: dag
        hour: uur
        minute: minuut
        second: seconde
        plural_day: dagen
        plural_hour: uren
        plural_minute: minuten
        plural_second: seconden
        similar: '<click:run_command:"/foxgate alts {IP}"><hover:show_text:"Klik om alts te zien."><gold>[Vergelijkbaar]</gold></hover></click>'
        online: '<click:run_command:"/foxgate status {IP}"><hover:show_text:"Klik om status te controleren."><green>Online</green></hover></click>'
    add_remove:
        invalidip: '{prefix} {IP}<red> is geen geldig IP/Gebruikersnaam!'
        already: '{prefix} {IP}<red> is al toegevoegd/verwijderd uit de database!'
        add: '{prefix} {IP}<green> is toegevoegd aan de database!'
        remove: '{prefix} {IP}<green> is verwijderd uit de database!'
    check:
        invalidip: '{prefix} {IP}<red> is geen geldig IP/Gebruikersnaam!'
        cached: '{prefix} {IP}<yellow> is al in de cache van de database opgeslagen. Je kunt <white><underlined><click:run_command:"/foxgate status {IP}">hier klikken om de opgeslagen informatie in de database te bekijken</click></underlined></white>.'
        checking: '{prefix} <yellow>Controleren van <white>{IP}<yellow>...'
        saving: '{prefix} <yellow>Controleren voor <white>{IP}</white> voltooid, wachten op database bij het opslaan van gegevens...'
        checked: '{prefix} {IP}<green> is succesvol gecontroleerd, bekijk de verkregen informatie in de database met het commando <gray>(/foxgate status)</gray> of <white><underlined><click:run_command:"/foxgate status {IP}">klik hier</click></underlined></white>.'
        pre-checking: '{prefix} {IP}<yellow> wordt gescand vanuit een eerdere controle, wacht eerst op de resultaten voordat je een andere controle op ditzelfde IP uitvoert.'
    clearcache:
        purging: '{prefix} <white>We zijn het <yellow>cachebestand aan het wissen</yellow>...'
        purging_correctly: '{prefix} <green>Het cachebestand is gewist.'
        purging_problem: '{prefix} <red>Fout bij het wissen van het cachebestand. Controleer de console.'
    db:
        invalid_usage: '{prefix} Gebruik het commando <aqua>/foxgate db <purge/reconnect><reset>.'
        reconnecting: '{prefix} <yellow>Proberen opnieuw verbinding te maken met de database...'
        reconnect_correctly: '{prefix} <green>De database is opnieuw verbonden.'
        reconnect_problem: '{prefix} <red>Fout bij het opnieuw verbinden met de database. Controleer de console.'
        purging: '{prefix} <yellow>Proberen de database op te schonen (purge)...'
        purging_correctly: '{prefix} <green>De database is opgeschoond.'
        purging_problem: '{prefix} <red>Fout bij het opschonen van de database. Controleer de console.'
    debug:
        enable: '{prefix} <green>Debugmodus ingeschakeld. Controleer de console.'
        disable: '{prefix} <red>Debugmodus uitgeschakeld.'
    reload:
        message: '{prefix} <green>Het configuratiebestand is herladen.'
    status:
        invalidip: '{prefix} {IP}<red> is geen geldig IP!'
        # Here you can find new placeholders only for this message:
        #
        # {DETECTED} - Return only the services that detected a VPN with an IP.
        # {UNDETECTED} - Return only the services that didn't detect a VPN with an IP.
        # {LIST} - Return both lists, but with different colors (customizable).
        # {MAX} - Return the maximum number of flags required to deny access to a player.
        # {COUNT_DETECTED} - Return the number of services that a player's IP has been detected with.
        # {COUNT_UNDETECTED} - Return the number of services that a player's IP hasn't been detected with.
        # {STATUS} - Return the status of the player.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
        # {GEO_COUNTRY} - Returns the player's country. (Only works with premium version).
        # {GEO_ASN} - Return the player's ASN (Only works with premium version).
        detected: <red>
        undetected: <green>
        none: <red>Geen.
        no_cached: <red>Niet in cache van database.
        allow: <green>Geverifieerd.
        deny: <red>Geblokkeerd.
        saved: <yellow>Gescaand.
        info: ' \n <green>Status bekijken van <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Hostnaam: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>Status: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>Niet gedetecteerd: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>Gedetecteerd: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>Services: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Land: <aqua>{GEO_COUNTRY} \n '
    update:
        invalid_usage: '{prefix} Gebruik het commando <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>We zijn al een bestand aan het downloaden...'
        backend_down: '{prefix} <red>Onze backend lijkt down of instabiel. We kunnen niet updaten en het verzoek voltooien.'
        invalid_license: '{prefix} <red>Je licentie is niet geldig, geef een geldige sleutel voor deze actie.'
        downloading_asn: '{prefix} <yellow>ASN downloaden...'
        downloading_ranges: '{prefix} <yellow>IP-bereiken downloaden...'
        downloading_hostnames: '{prefix} <yellow>Hostnamen downloaden...'
        downloading_jar: '{prefix} <yellow>Plug-in downloaden...'
        downloaded_asn: '{prefix} <green>Nieuwste ASN gedownload van onze backend/centraal. Wijzigingen zijn toegepast.'
        downloaded_ranges: '{prefix} <green>Nieuwste IP-bereiken gedownload van onze backend/centraal. Wijzigingen zijn toegepast.'
        downloaded_hostnames: '{prefix} <green>Nieuwste hostnamen gedownload van onze backend/centraal. Wijzigingen zijn toegepast.'
        downloaded_jar: '{prefix} <green>Nieuwste JAR gedownload van onze backend/centraal. Herstart je server om wijzigingen toe te passen.'
    verbose:
        enable: '{prefix} <green>Je hebt de uitgebreide modus ingeschakeld.'
        disable: '{prefix} <red>Je hebt de uitgebreide modus uitgeschakeld.'
        # Here you can find new placeholders only for this message:
        #
        # {PLAYER} - Returns the player's name.
        # {IP} - Returns the player's IP.
        # {SERVICE} - Return the service's name.
        # {FLAGS} - Return the currently amount of Flags.
        # {FLAGS_ADDED} - Return the amount of Flags added.
        # {MAXFLAGS} - Return the amount of Flags for being detected.
        no_malicious: '{prefix} <green>[VERBOSE] <aqua>{PLAYER} <gray>is geen VPN met service: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>vlaggen:</gray><red>{FLAGS}</red><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        malicious: '{prefix} <red>[VERBOSE] <aqua>{PLAYER} <gray>is gemarkeerd als een VPN met service: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>vlaggen:</gray><red>{FLAGS}</red><green>(+{FLAGS_ADDED})</green><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        ignored: '{prefix} <yellow>[VERBOSE] <aqua>{PLAYER} <gray>is genegeerd omdat het op de whitelist staat <green>{type} <dark_gray>({IP})'
    whitelist:
        invalid_usage: '{prefix} Gebruik het commando <dark_gray>''''</dark_gray>/fg whitelist <green><add/remove/info/purge></green> <yellow>[naam/ip]</yellow> <aqua>[reden]</aqua> <light_purple>[tijd]</light_purple><dark_gray>''''</dark_gray><reset>.'
        already: '{prefix} {IP}<red> staat al op de whitelist/staat niet op de whitelist in de configuratie!'
        whitelisting: '{prefix} <yellow>Opslaan naar whitelist: <white>{IP}</white>, een moment...'
        whitelisted: '{prefix} {IP}<green> is op de whitelist gezet in de configuratie met type <white>{type}</white> voor <white>{time}</white>. Je kunt <white><underlined><click:run_command:"/foxgate whitelist remove {IP}">hier klikken om het opnieuw te verwijderen</click></underlined></white>.'
        unwhitelisting: '{prefix} <yellow>Verwijderen van whitelist: <white>{IP}</white>, een moment...'
        unwhitelisted: '{prefix} {IP}<green> is van de whitelist gehaald in de configuratie met type <white>{type}</white>. Je kunt <white><underlined><click:run_command:"/foxgate whitelist add {IP}">hier klikken om het opnieuw toe te voegen</click></underlined></white>.'
        type_ip: IP
        type_name: Naam
        problem: '{prefix} <red>Fout bij het toevoegen/verwijderen aan de whitelist. Controleer de console.'
        invalid_time: '{prefix} <red>Het tijdsformaat is ongeldig. Gebruik epoch of formaten zoals <white>1d</white>, <white>3h</white>, <white>15m</white>, <white>30s</white> of <white>permanent</white>.'
        purging: '{prefix} <yellow>Proberen de whitelist op te schonen (purge)...'
        purging_correctly: '{prefix} <green>De whitelist is opgeschoond.'
        purging_problem: '{prefix} <red>Fout bij het opschonen van de whitelist. Controleer de console.'
        # Here you can find new placeholders only for this message:
        #
        # {TYPE} - Return "IP"/"Name".
        # {REASON} - Return the reason why this name/IP is whitelisted.
        # {EXPIRATION} - Return the expiration time.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
        # {GEO_COUNTRY} - Return the country player (Premium and only works enabling the feature).
        # {GEO_ASN} - Return the ASN player (Premium and only works enabling the feature).
        info: ' \n <green>Whitelist-informatie van <aqua>{IP}\n <dark_gray>▪ <white>Type: <gold>{TYPE}</gold> \n <dark_gray>▪ <white>Reden: <yellow>{REASON}</yellow>\n <dark_gray>▪ <white>Verloopt: <light_purple>{EXPIRATION}</light_purple>\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Land: <aqua>{GEO_COUNTRY} \n '
        # View about the format date here:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: yyyy-MM-dd HH:mm:ss
        permanent: Permanent.
        noreason: Geen reden.
        nowhitelist: '{prefix} {IP}<red> is niet opgeslagen in de whitelist met type <white>{type}</white>.'
    predebug:
        invalid_usage: '{prefix} Gebruik het commando <aqua>/fg <dwdebug/tgdebug> <green><allow/deny/country/asn/isp></green><reset>.'
        sending: '{prefix} <yellow>Verzenden om je <white>{type}</white> te testen in modus <white>{mode}</white>...</yellow>'
        sended: '{prefix} <green>Verzonden!'
        problem: '{prefix} <red>Fout bij het verzenden van een debug van <white>{type}</white>!'