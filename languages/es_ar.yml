#
# 🔨 Configurar los mensajes de los plugins.
# Podés usar MiniMessage en esta sección. También funciona con
# colores legacy de Bukkit, pero no se recomienda por
# incompatibilidades.
# También se soporta PlaceholderAPI.
#
# 📷 Visor:
# https://webui.advntr.dev/
#
# 📚 Formato:
# https://docs.papermc.io/adventure/minimessage/format/
message:

    # Mensaje de expulsión cuando el plugin bloquea a un jugador.
    #
    # {PLAYER} - Devuelve el nombre del jugador.
    # {IP} - Devuelve la IP del jugador.
    # {UUID} - Devuelve el UUID del jugador. (BungeeCord no lo soporta)
    # {ISP} - Devuelve el ISP de la IP (si está cacheada), del módulo ISP.
    # {HOSTNAME} - Devuelve el Hostname de la IP (si está cacheada), del módulo ISP.
    # {COUNTRY} - Devuelve el país del jugador. (Solo versión premium).
    # {ASN} - Devuelve el ASN del jugador. (Solo versión premium).
    kick:
        vpn: '<red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Tu conexión fue denegada por ser VPN o Proxy.\n<gray>Probá desactivando primero tu VPN/proxy antes de unirte.</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: Servicios</dark_gray>'
        iplimiter: '<red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Tu conexión fue denegada para unirte.\n<gray>Encontramos demasiadas conexiones en tu misma IP.</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: IPLimiter</dark_gray>'
        isp: '<red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Tu conexión fue denegada por ser maliciosa.\n<gray>El Proveedor de Internet "<light_purple>{ISP}</light_purple>" que usás está prohibido en este servidor.</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: ISPFilter</dark_gray>'
        iprange: '<red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Tu conexión fue denegada por ser maliciosa.\n<gray>La IP está en una lista negra en nuestra base de datos por estar en un rango malicioso.</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: IPRange</dark_gray>'
        bogon: '<red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Tu conexión fue denegada por ser bogon.\n<gray>La IP es considerada bogon (red privada).</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz'
        country: '<red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Tu conexión fue denegada por ser maliciosa.\n<gray>El país desde el que te conectás "<light_purple>{COUNTRY}</light_purple>" está prohibido en este servidor.</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: País</dark_gray>'
        asn: '<red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Tu conexión fue denegada por ser VPN o Proxy.\n<gray>El Proveedor de Internet ASN "<light_purple>{ASN}</light_purple>" es un proveedor conocido de VPN o Tor.</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Módulo: ASN</dark_gray>'
        # Algunos placeholders no funcionan en este mensaje porque se usa para expulsar
        # al jugador cuando intenta unirse y su IP todavía está siendo verificada en
        # una pre-verificación. Esto evita verificaciones duplicadas hasta que la
        # anterior esté completa.
        checking: <red><bold>✘</bold> Fuiste bloqueado por <bold>FoxGate AntiVPN</bold>:\n\n<white>Estamos verificando tu conexión.\n<gray>FoxGate está escaneando tu conexión, por favor esperá unos segundos.</gray>\n\n<gold>¿Es un error?</gold> <white>Unite a nuestro servidor de discord.\n<aqua><underlined>discord.idcteam.xyz
    # Notificación cuando un jugador es expulsado. Podés evitar este mensaje dejándolo vacío.
    notify:
        vpn: '{prefix} <gray>¡</gray><aqua>{player} <gray>fue detectado usando una VPN y fue expulsado! <green>({IP})'
        isp: '{prefix} <gray>¡</gray><aqua>{player} <gray>fue expulsado por unirse con un ISP en lista negra: <aqua>{ISP}</aqua>! <green>({IP})'
        iprange: '{prefix} <gray>¡</gray><aqua>{player} <gray>fue expulsado por unirse con un IPRange en lista negra! <green>({IP})'
        bogon: '{prefix} <gray>¡</gray><aqua>{player} <gray>intentó unirse desde una IP bogon: <green>{IP}</green>!'
        country: '{prefix} <gray>¡</gray><aqua>{player} <gray>fue expulsado por unirse con un país en lista negra: <aqua>{COUNTRY}</aqua>! <green>({IP})'
        asn: '{prefix} <gray>¡</gray><aqua>{player} <gray>fue expulsado por unirse con un ASN en lista negra: <aqua>{ASN}</aqua>! <green>({IP})'
    # Mensaje para mostrar cuando un jugador es bloqueado por un módulo. (Para el comando status)
    blocked:
        isp: <gold>Bloqueado por su ISP.
        iprange: <gold>Bloqueado por su IPRange.
        bogon: <gold>Bloqueado por IP Bogon.
        country: <gold>Bloqueado por su País.
        asn: <gold>Bloqueado por su ASN.
    # Esto solo aparecerá en la consola.
    # Puede ayudar con debug si un servicio no funciona correctamente.
    # Podés evitar este mensaje dejándolo vacío.
    error: '{prefix} Error al verificar VPN con <aqua>"{service}"</aqua> a <yellow>{player}</yellow>: {error}'
    # Determina el prefijo de mensaje para el plugin.
    prefix: <yellow><bold>FGT</bold></yellow><dark_gray> ►<reset>
    help:
        add: Agregar una IP a la base de datos.
        alts: Verificar todos los usuarios en una IP.
        check: Verificar una IP externa y guardar en la base de datos.
        clearcache: Limpiar el archivo cache de nombres de usuario guardados.
        db: Purgar o reconectar la base de datos.
        debug: Depurar FoxGate en la consola.
        reload: Recargar archivo de configuración.
        remove: Remover una IP de la base de datos.
        status: Ver información sobre una IP cacheada en la base de datos.
        update: Actualizar automáticamente componentes del plugin.
        verbose: Activar/desactivar modo verbose.
        whitelist: Permitir a un usuario o IP.
        predebug: (Premium) Enviar un webhook de discord o forward de telegram para probar cómo se ven.
    alts:
        invalidip: '{prefix} {IP}<red> no es una IP/Nombre de usuario válido.'
        invalidcheck: '{prefix} {IP}<red> no podemos encontrar la IP/usuario solicitado desde el cache.'
        checking: '{prefix} {IP}<yellow> verificando alts...'
        # Acá podés encontrar estos placeholders:
        #
        # {NAME} - Devuelve los nombres del jugador. (solo para 'output')
        # {IP} - Devuelve la IP del jugador.
        # {ISP} - Devuelve el ISP de la IP (si está cacheada), del módulo ISP.
        # {ALTS} - Devuelve los alts del Usuario/IP.
        # {OUTPUT} - Devuelve el formato de 'output'.
        # {TIME} - Devuelve la última vez. (solo para 'output')
        # {TIME_AGO} - Devuelve el tiempo transcurrido. (solo para 'output')
        # {COUNTRY} - Devuelve el país de la IP. (Solo versión premium).
        # {ASN} - Devuelve el ASN de la IP. (Solo versión premium).
        # {SIMILAR} - Muestra similar si se encontró con IP dinámica, de lo contrario estará vacío.
        output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - Última conexión: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
        info: ' \n <green>Viendo Alts de <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Alts:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>País: <aqua>{GEO_COUNTRY} \n '
        # Ver sobre el formato de fecha acá:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: dd-MM-yyyy HH:mm:ss
        day: día
        hour: hora
        minute: minuto
        second: segundo
        plural_day: días
        plural_hour: horas
        plural_minute: minutos
        plural_second: segundos
        similar: <click:run_command:"/foxgate alts {IP}"><hover:show_text:"Hacé clic para ver alts."><gold>[Similar]</gold></hover></click>
        online: <click:run_command:"/foxgate status {IP}"><hover:show_text:"Hacé clic para ver el estado."><green>Conectado</green></hover></click>
    add_remove:
        invalidip: '{prefix} {IP}<red> no es una IP/Nombre de usuario válido.'
        already: '{prefix} {IP}<red> ya fue agregado/removido de la base de datos.'
        add: '{prefix} {IP}<green> fue agregado a la base de datos.'
        remove: '{prefix} {IP}<green> fue removido de la base de datos.'
    check:
        invalidip: '{prefix} {IP}<red> no es una IP/Nombre de usuario válido.'
        cached: '{prefix} {IP}<yellow> ya está cacheado en la base de datos. Podés <white><underlined><click:run_command:"/foxgate status {IP}">hacer clic acá para ver la información guardada en la base de datos</click></underlined></white>.'
        checking: '{prefix} <yellow>Verificando <white>{IP}<yellow>...'
        checked: '{prefix} {IP}<green> fue verificado exitosamente, mirá la información obtenida en la base de datos con el comando <gray>(/foxgate status)</gray> o <white><underlined><click:run_command:"/foxgate status {IP}">Hacé clic acá</click></underlined></white>.'
        pre-checking: '{prefix} {IP}<yellow> está siendo escaneado por una verificación previa, esperá los resultados antes de ejecutar otra en esta misma IP.'
    clearcache:
        purging: '{prefix} <white>Estamos <yellow>purgando</yellow> el archivo cache...'
        purging_correctly: '{prefix} <green>El archivo cache fue purgado.'
        purging_problem: '{prefix} <red>Error al intentar purgar el archivo cache. Revisá la consola.'
    db:
        invalid_usage: '{prefix} Usá el comando <aqua>/foxgate db <purge/reconnect><reset>.'
        reconnecting: '{prefix} <yellow>Intentando reconectar a la base de datos...'
        reconnect_correctly: '{prefix} <green>La base de datos fue reconectada.'
        reconnect_problem: '{prefix} <red>Error al intentar reconectar a la base de datos. Revisá la consola.'
        purging: '{prefix} <yellow>Intentando purgar la base de datos...'
        purging_correctly: '{prefix} <green>La base de datos fue purgada.'
        purging_problem: '{prefix} <red>Error al intentar purgar la base de datos. Revisá la consola.'
    debug:
        enable: '{prefix} <green>Modo debug activado. Revisá la consola.'
        disable: '{prefix} <red>Modo debug desactivado.'
    reload:
        message: '{prefix} <green>El archivo de configuración fue recargado.'
    status:
        invalidip: '{prefix} {IP}<red> no es una IP válida.'
        # Acá podés encontrar nuevos placeholders solo para este mensaje:
        #
        # {DETECTED} - Devuelve solo los servicios que detectaron VPN con una IP.
        # {UNDETECTED} - Devuelve solo los servicios que NO detectaron VPN con una IP.
        # {LIST} - Devuelve ambas listas, pero con colores diferentes (personalizables).
        # {MAX} - Devuelve el número máximo de flags requeridos para denegar acceso a un jugador.
        # {COUNT_DETECTED} - Devuelve el número de servicios que detectaron la IP del jugador.
        # {COUNT_UNDETECTED} - Devuelve el número de servicios que NO detectaron la IP del jugador.
        # {STATUS} - Devuelve el estado del jugador.
        # {ISP} - Devuelve el ISP de la IP (si está cacheada), del módulo ISP.
        # {HOSTNAME} - Devuelve el Hostname de la IP (si está cacheada), del módulo ISP.
        # {GEO_COUNTRY} - Devuelve el país del jugador. (Solo versión premium).
        # {GEO_ASN} - Devuelve el ASN del jugador. (Solo versión premium).
        detected: <red>
        undetected: <green>
        none: <red>Ninguno.
        no_cached: <red>No cacheado en la base de datos.
        allow: <green>Verificado.
        deny: <red>Bloqueado.
        saved: <yellow>Escaneado.
        info: ' \n <green>Viendo estado de <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Hostname: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>Estado: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>No detectados: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>Detectados: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>Servicios: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>País: <aqua>{GEO_COUNTRY} \n '
    update:
        invalid_usage: '{prefix} Usá el comando <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>Ya estamos descargando un archivo...'
        backend_down: '{prefix} <red>Nuestro backend parece estar caído o inestable. No podemos actualizar y completar la solicitud.'
        invalid_license: '{prefix} <red>Tu licencia no es válida, poné una clave válida para esta acción.'
        downloading_asn: '{prefix} <yellow>Descargando ASN...'
        downloading_ranges: '{prefix} <yellow>Descargando Rangos...'
        downloading_hostnames: '{prefix} <yellow>Descargando Hostnames...'
        downloading_jar: '{prefix} <yellow>Descargando plugin...'
        downloaded_asn: '{prefix} <green>Descargado último ASN de nuestro backend/central. Cambios ya aplicados.'
        downloaded_ranges: '{prefix} <green>Descargados últimos Rangos de nuestro backend/central. Cambios ya aplicados.'
        downloaded_hostnames: '{prefix} <green>Descargados últimos Hostnames de nuestro backend/central. Cambios ya aplicados.'
        downloaded_jar: '{prefix} <green>Descargado último JAR de nuestro backend/central. Reiniciá tu servidor para aplicar cambios.'
    verbose:
        enable: '{prefix} <green>Activaste el modo verbose.'
        disable: '{prefix} <red>Desactivaste el modo verbose.'
        # Acá podés encontrar nuevos placeholders solo para este mensaje:
        #
        # {PLAYER} - Devuelve el nombre del jugador.
        # {IP} - Devuelve la IP del jugador.
        # {SERVICE} - Devuelve el nombre del servicio.
        # {FLAGS} - Devuelve la cantidad actual de Flags.
        # {FLAGS_ADDED} - Devuelve la cantidad de Flags agregados.
        # {MAXFLAGS} - Devuelve la cantidad de Flags para ser detectado.
        no_malicious: '{prefix} <green>[VERBOSE] <aqua>{PLAYER} <gray>no es una VPN con el servicio: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flags:</gray><red>{FLAGS}</red><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        malicious: '{prefix} <red>[VERBOSE] <aqua>{PLAYER} <gray>está marcado como VPN con el servicio: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flags:</gray><red>{FLAGS}</red><green>(+{FLAGS_ADDED})</green><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        ignored: '{prefix} <yellow>[VERBOSE] <aqua>{PLAYER} <gray>fue ignorado por estar permitido en <green>{type} <dark_gray>({IP})'
    whitelist:
        invalid_usage: '{prefix} Usá el comando <dark_gray>''''</dark_gray>/fg whitelist <green><add/remove/info/purge></green> <yellow>[nombre/ip]</yellow> <aqua>[razón]</aqua> <light_purple>[tiempo]</light_purple><dark_gray>''''</dark_gray><reset>.'
        already: '{prefix} {IP}<red> ya está permitido/despermitido en la configuración.'
        whitelisted: '{prefix} {IP}<green> fue permitido en la configuración con tipo <white>{type}</white> por <white>{time}</white>. Podés <white><underlined><click:run_command:"/foxgate whitelist remove {IP}">hacer clic acá para removerlo otra vez</click></underlined></white>.'
        unwhitelisted: '{prefix} {IP}<green> fue despermitido en la configuración con tipo <white>{type}</white>. Podés <white><underlined><click:run_command:"/foxgate whitelist add {IP}">hacer clic acá para agregarlo otra vez</click></underlined></white>.'
        type_ip: IP
        type_name: Nombre
        problem: '{prefix} <red>Error al intentar agregar/remover de la lista de permitidos. Revisá la consola.'
        invalid_time: '{prefix} <red>El formato de tiempo es inválido. Usá epoch o formatos como <white>1d</white>, <white>3h</white>, <white>15m</white>, <white>30s</white> o <white>permanente</white>.'
        purging: '{prefix} <yellow>Intentando purgar la lista de permitidos...'
        purging_correctly: '{prefix} <green>La lista de permitidos fue purgada.'
        purging_problem: '{prefix} <red>Error al intentar purgar la lista de permitidos. Revisá la consola.'
        # Acá podés encontrar nuevos placeholders solo para este mensaje:
        #
        # {TYPE} - Devuelve "IP"/"Nombre".
        # {REASON} - Devuelve la razón por la que este nombre/IP está permitido.
        # {EXPIRATION} - Devuelve el tiempo de expiración.
        # {ISP} - Devuelve el ISP de la IP (si está cacheada), del módulo ISP.
        # {HOSTNAME} - Devuelve el Hostname de la IP (si está cacheada), del módulo ISP.
        # {GEO_COUNTRY} - Devuelve el país del jugador (Premium y solo funciona activando la función).
        # {GEO_ASN} - Devuelve el ASN del jugador (Premium y solo funciona activando la función).
        info: ' \n <green>Información de lista de permitidos de <aqua>{IP}\n <dark_gray>▪ <white>Tipo: <gold>{TYPE}</gold> \n <dark_gray>▪ <white>Razón: <yellow>{REASON}</yellow>\n <dark_gray>▪ <white>Vencimiento: <light_purple>{EXPIRATION}</light_purple>\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>País: <aqua>{GEO_COUNTRY} \n '
        # Ver sobre el formato de fecha acá:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: dd-MM-yyyy HH:mm:ss
        permanent: Permanente.
        noreason: Sin razón.
        nowhitelist: '{prefix} {IP}<red> no está guardado en la lista de permitidos en tipo <white>{type}</white>.'
    predebug:
        invalid_usage: '{prefix} Usá el comando <aqua>/fg <dwdebug/tgdebug> <green><allow/deny/country/asn/isp></green><reset>.'
        sending: '{prefix} <yellow>Enviando para probar tu <white>{type}</white> en modo <white>{mode}</white>...</yellow>'
        sended: '{prefix} <green>¡Enviado!'
        problem: '{prefix} <red>Error al intentar enviar un debug de <white>{type}</white>!'
