# 🔨 Config tin nhắn của FG.
# Bạn có thể sử dụng MiniMessage trong phần này. Nó cũng hoạt động với
# các mã màu bukkit cũ, nhưng không được khuyến khích vì có thể
# không tương thích!
# Ngoài ra, PlaceholderAPI cũng được hỗ trợ.
#  
# 📷 Trình xem trước:
# https://webui.advntr.dev/
#  
# 📚 Định dạng:
# https://docs.advntr.dev/minimessage/format.html
message:
    
    # Tin nhắn kick khi plugin chặn một người chơi.
    #  
    # {PLAYER} - Trả về tên người chơi.
    # {IP} - Trả về địa chỉ IP của người chơi.
    # {UUID} - Trả về UUID của người chơi. (BungeeCord không hỗ trợ cái này)
    # {ISP} - Trả về nhà cung cấp dịch vụ mạng (ISP) của IP, (trong trường hợp IP/ISP được lưu trong cache), từ mô-đun ISP.
    # {HOSTNAME} - Trả về tên máy chủ của IP, (trong trường hợp IP được lưu trong cache), từ mô-đun ISP.
    # {GEO_COUNTRY} - Trả về quốc gia của người chơi. (Chỉ hoạt động với phiên bản premium).
    # {GEO_ASN} - Trả về ASN của người chơi (Chỉ hoạt động với phiên bản premium).
    kick:
        vpn: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Kết nối của bạn bị từ chối vì là VPN hoặc Proxy.\n<gray>Hãy thử tắt VPN/proxy của bạn trước khi tham gia.</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Mô-đun: Dịch vụ</dark_gray>'
        iplimiter: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Kết nối của bạn bị từ chối để tham gia.\n<gray>Chúng tôi tìm thấy quá nhiều kết nối từ cùng một IP của bạn.</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Mô-đun: IPLimiter</dark_gray>'
        isp: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Kết nối của bạn bị từ chối vì độc hại.\n<gray>Nhà cung cấp dịch vụ mạng "<light_purple>{ISP}</light_purple>" mà bạn sử dụng bị cấm trên máy chủ này.</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Mô-đun: ISPFilter</dark_gray>'
        iprange: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Kết nối của bạn bị từ chối vì độc hại.\n<gray>IP đang trong danh sách đen của cơ sở dữ liệu vì thuộc phạm vi độc hại.</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Mô-đun: IPRange</dark_gray>'
        bogon: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Kết nối của bạn bị từ chối vì là bogon.\n<gray>IP được coi là bogon (mạng riêng).</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz'
        country: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Kết nối của bạn bị từ chối vì độc hại.\n<gray>Quốc gia bạn kết nối từ "<light_purple>{GEO_COUNTRY}</light_purple>" bị cấm trên máy chủ này.</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Mô-đun: Quốc gia</dark_gray>'
        asn: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Kết nối của bạn bị từ chối vì là VPN hoặc Proxy.\n<gray>Nhà cung cấp dịch vụ mạng ASN "<light_purple>{GEO_ASN}</light_purple>" là nhà cung cấp VPN hoặc Tor đã biết.</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({GEO_ASN})</gray>\n<dark_gray>Mô-đun: ASN</dark_gray>'
        # Một số placeholder không hoạt động trong tin nhắn này vì nó được sử dụng để kick
        # người chơi khi họ cố gắng tham gia và IP của họ vẫn đang được xác minh trong
        # quá trình tiền kiểm tra. Điều này ngăn chặn việc xác minh trùng lặp cho đến khi
        # lần xác minh trước đó hoàn tất.
        checking: '<red><bold>✘</bold> Bạn đã bị chặn bởi <bold>FoxGate AntiVPN</bold>:\n\n<white>Chúng tôi đang kiểm tra kết nối của bạn.\n<gray>FoxGate đang quét kết nối của bạn, vui lòng đợi vài giây.</gray>\n\n<gold>Đây có phải là lỗi không?</gold> <white>Tham gia máy chủ discord của chúng tôi.\n<aqua><underlined>discord.idcteam.xyz'
    # Thông báo khi một người chơi bị kick. Bạn có thể tắt tin nhắn này bằng cách để trống.
    notify:
        vpn: '{prefix} <aqua>{player} <gray>đã bị phát hiện sử dụng VPN và đã bị kick! <green>({IP})'
        isp: '{prefix} <aqua>{player} <gray>đã bị kick vì tham gia với ISP bị chặn: <aqua>{ISP}</aqua>! <green>({IP})'
        iprange: '{prefix} <aqua>{player} <gray>đã bị kick vì tham gia với IPRange bị chặn! <green>({IP})'
        bogon: '{prefix} <aqua>{player} <gray>đã cố gắng tham gia từ một IP bogon: <green>{IP}</green>!'
        country: '{prefix} <aqua>{player} <gray>đã bị kick vì tham gia từ một quốc gia bị chặn: <aqua>{GEO_COUNTRY}</aqua>! <green>({IP})'
        asn: '{prefix} <aqua>{player} <gray>đã bị kick vì tham gia với một ASN bị chặn: <aqua>{GEO_ASN}</aqua>! <green>({IP})'
    # Tin nhắn hiển thị khi người chơi bị chặn bởi một mô-đun. (Dùng cho lệnh status)
    blocked:
        isp: '<gold>Bị chặn bởi nhà cung cấp mạng.'
        iprange: '<gold>Bị chặn bởi IPRange của họ.'
        bogon: '<gold>Bị chặn vì IP Bogon.'
        country: '<gold>Bị chặn bởi quốc gia.'
        asn: '<gold>Bị chặn bởi ASN.'
    # Tin nhắn này sẽ chỉ hiển thị trong console.
    # Điều này có thể giúp gỡ lỗi trong trường hợp một dịch vụ không hoạt động chính xác.
    # Bạn có thể tắt tin nhắn này bằng cách để trống.
    error: '{prefix} Lỗi khi xác minh VPN với <aqua>"{service}"</aqua> và <yellow>{player}</yellow>: {error}'
    # Tiền tố tin nhắn cho plugin.
    prefix: <yellow><bold>FGT</bold></yellow><dark_gray> ►</dark_gray>
    help:
        add: Thêm một IP vào cơ sở dữ liệu.
        alts: Kiểm tra tất cả người dùng trong một IP.
        check: Kiểm tra một IP bên ngoài và lưu vào cơ sở dữ liệu.
        clearcache: Xóa tệp cache chứa tên người dùng đã lưu.
        db: Dọn dẹp hoặc kết nối lại cơ sở dữ liệu.
        debug: Gỡ lỗi FoxGate trong console.
        reload: Tải lại tệp cấu hình.
        remove: Xóa một IP khỏi cơ sở dữ liệu.
        status: Xem thông tin về một IP đã được cache trong cơ sở dữ liệu.
        update: Cập nhật tự động các thành phần plugin.
        verbose: Bật/tắt chế độ thông báo chi tiết.
        whitelist: Thêm người dùng hoặc IP vào danh sách trắng.
        predebug: (Premium) Gửi một webhook discord hoặc tin nhắn telegram để kiểm tra hiển thị.
    alts:
        invalidip: '{prefix} {IP}<red> không phải là IP/Tên người dùng hợp lệ!'
        invalidcheck: '{prefix} {IP}<red> không thể tìm thấy yêu cầu IP/người dùng từ cache!'
        checking: '{prefix} {IP}<yellow> đang kiểm tra các tài khoản phụ...'
        # Ở đây bạn có thể tìm thấy các placeholder sau:
        #
        # {NAME} - Trả về tên của người chơi. (chỉ dành cho 'output')
        # {IP} - Trả về địa chỉ IP của người chơi.
        # {ISP} - Trả về ISP của IP (nếu đã cache), từ mô-đun ISP.
        # {ALTS} - Trả về các tài khoản phụ của Người dùng/IP.
        # {OUTPUT} - Trả về định dạng của 'output'.
        # {TIME} - Trả về lần cuối cùng. (chỉ dành cho 'output')
        # {TIME_AGO} - Trả về thời gian đã trôi qua. (chỉ dành cho 'output')
        # {GEO_COUNTRY} - Trả về quốc gia của IP. (Chỉ phiên bản premium).
        # {GEO_ASN} - Trả về ASN của IP. (Chỉ phiên bản premium).
        # {SIMILAR} - Hiển thị tương tự nếu tìm thấy với IP động, nếu không sẽ trống.
        output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - Kết nối cuối: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
        info: ' \n <green>Đang xem các tài khoản phụ của <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Tài khoản phụ:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Quốc gia: <aqua>{GEO_COUNTRY} \n '
        # Xem về định dạng ngày tháng tại đây:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: 'dd-MM-yyyy HH:mm:ss'
        day: 'ngày'
        hour: 'giờ'
        minute: 'phút'
        second: 'giây'
        plural_day: 'ngày'
        plural_hour: 'giờ'
        plural_minute: 'phút'
        plural_second: 'giây'
        similar: '<click:run_command:"/foxgate alts {IP}"><hover:show_text:"Nhấn để xem các tài khoản phụ."><gold>[Tương tự]</gold></hover></click>'
        online: '<click:run_command:"/foxgate status {IP}"><hover:show_text:"Nhấn để kiểm tra trạng thái."><green>Trực tuyến</green></hover></click>'
    add_remove:
        invalidip: '{prefix} {IP}<red> không phải là IP/Tên người dùng hợp lệ!'
        already: '{prefix} {IP}<red> đã được thêm/xóa khỏi cơ sở dữ liệu!'
        add: '{prefix} {IP}<green> đã được thêm vào cơ sở dữ liệu!'
        remove: '{prefix} {IP}<green> đã được xóa khỏi cơ sở dữ liệu!'
    check:
        invalidip: '{prefix} {IP}<red> không phải là IP/Tên người dùng hợp lệ!'
        cached: '{prefix} {IP}<yellow> đã được lưu trong cache của cơ sở dữ liệu. Bạn có thể <white><underlined><click:run_command:"/foxgate status {IP}">nhấn vào đây để xem thông tin đã lưu</click></underlined></white>.'
        checking: '{prefix} <yellow>Đang kiểm tra <white>{IP}<yellow>...'
        checked: '{prefix} {IP}<green> đã được kiểm tra thành công, xem thông tin thu được trong cơ sở dữ liệu bằng lệnh <gray>(/foxgate status)</gray> hoặc <white><underlined><click:run_command:"/foxgate status {IP}">nhấn vào đây</click></underlined></white>.'
        pre-checking: '{prefix} {IP}<yellow> đang được quét từ một lần kiểm tra trước, hãy đợi kết quả trước khi chạy một lần kiểm tra khác trên cùng IP này.'
    clearcache:
        purging: '{prefix} <white>Chúng tôi đang <yellow>dọn dẹp</yellow> tệp cache...'
        purging_correctly: '{prefix} <green>Tệp cache đã được dọn dẹp.'
        purging_problem: '{prefix} <red>Lỗi khi cố gắng dọn dẹp tệp cache. Vui lòng kiểm tra console.'
    db:
        invalid_usage: '{prefix} Sử dụng lệnh <aqua>/foxgate db <purge/reconnect><reset>.'
        reconnecting: '{prefix} <yellow>Đang cố gắng kết nối lại với cơ sở dữ liệu...'
        reconnect_correctly: '{prefix} <green>Đã kết nối lại với cơ sở dữ liệu.'
        reconnect_problem: '{prefix} <red>Lỗi khi cố gắng kết nối lại với cơ sở dữ liệu. Vui lòng kiểm tra console.'
        purging: '{prefix} <yellow>Đang cố gắng dọn dẹp cơ sở dữ liệu...'
        purging_correctly: '{prefix} <green>Cơ sở dữ liệu đã được dọn dẹp.'
        purging_problem: '{prefix} <red>Lỗi khi cố gắng dọn dẹp cơ sở dữ liệu. Vui lòng kiểm tra console.'
    debug:
        enable: '{prefix} <green>Đã bật chế độ gỡ lỗi. Vui lòng kiểm tra console.'
        disable: '{prefix} <red>Đã tắt chế độ gỡ lỗi.'
    reload:
        message: '{prefix} <green>Tệp cấu hình đã được tải lại.'
    status:
        invalidip: '{prefix} {IP}<red> không phải là một IP hợp lệ!'
        # Ở đây bạn có thể tìm thấy các placeholder mới chỉ dành cho tin nhắn này:
        #  
        # {DETECTED} - Chỉ trả về các dịch vụ đã phát hiện VPN với một IP.
        # {UNDETECTED} - Chỉ trả về các dịch vụ không phát hiện VPN với một IP.
        # {LIST} - Trả về cả hai danh sách, nhưng với màu sắc khác nhau (có thể tùy chỉnh).
        # {MAX} - Trả về số lượng cờ báo tối đa cần thiết để từ chối quyền truy cập của người chơi.
        # {COUNT_DETECTED} - Trả về số lượng dịch vụ đã phát hiện IP của người chơi.
        # {COUNT_UNDETECTED} - Trả về số lượng dịch vụ không phát hiện IP của người chơi.
        # {STATUS} - Trả về trạng thái của người chơi.
        # {ISP} - Trả về nhà cung cấp dịch vụ mạng (ISP) của IP, (trong trường hợp được lưu trong cache), từ mô-đun ISP.
        # {HOSTNAME} - Trả về tên máy chủ của IP, (trong trường hợp được lưu trong cache), từ mô-đun ISP.
        # {GEO_COUNTRY} - Trả về quốc gia của người chơi. (Chỉ hoạt động với phiên bản premium).
        # {GEO_ASN} - Trả về ASN của người chơi (Chỉ hoạt động với phiên bản premium).
        detected: '<red>'
        undetected: '<green>'
        none: '<red>Không có.'
        no_cached: '<red>Chưa được lưu trong cơ sở dữ liệu.'
        allow: '<green>Đã xác minh.'
        deny: '<red>Đã chặn.'
        saved: '<yellow>Đã quét.'
        info: ' \n <green>Xem trạng thái của <aqua>{IP}\n <dark_gray>▪ <white>Nhà mạng: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Tên máy chủ: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>Trạng thái: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>Không phát hiện: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>Phát hiện: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>Dịch vụ: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Quốc gia: <aqua>{GEO_COUNTRY} \n '
    update:
        invalid_usage: '{prefix} Sử dụng lệnh <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>Chúng tôi đang tải một tệp tin...'
        backend_down: '{prefix} <red>Backend của chúng tôi dường như đang gặp sự cố hoặc không ổn định. Chúng tôi không thể cập nhật và hoàn thành yêu cầu.'
        invalid_license: '{prefix} <red>Giấy phép của bạn không hợp lệ, hãy nhập một khóa hợp lệ cho hành động này.'
        downloading_asn: '{prefix} <yellow>Đang tải ASN...'
        downloading_ranges: '{prefix} <yellow>Đang tải phạm vi...'
        downloading_hostnames: '{prefix} <yellow>Đang tải tên máy chủ...'
        downloading_jar: '{prefix} <yellow>Đang tải plugin...'
        downloaded_asn: '{prefix} <green>Đã tải ASN mới nhất từ backend/trung tâm của chúng tôi. Thay đổi đã được áp dụng.'
        downloaded_ranges: '{prefix} <green>Đã tải phạm vi mới nhất từ backend/trung tâm của chúng tôi. Thay đổi đã được áp dụng.'
        downloaded_hostnames: '{prefix} <green>Đã tải tên máy chủ mới nhất từ backend/trung tâm của chúng tôi. Thay đổi đã được áp dụng.'
        downloaded_jar: '{prefix} <green>Đã tải JAR mới nhất từ backend/trung tâm của chúng tôi. Khởi động lại máy chủ để áp dụng thay đổi.'
    verbose:
        enable: '{prefix} <green>Bạn đã bật chế độ thông báo chi tiết.'
        disable: '{prefix} <red>Bạn đã tắt chế độ thông báo chi tiết.'
        # Ở đây bạn có thể tìm thấy các placeholder mới chỉ dành cho tin nhắn này:
        #
        # {PLAYER} - Trả về tên người chơi.
        # {IP} - Trả về địa chỉ IP của người chơi.
        # {SERVICE} - Trả về tên dịch vụ.
        # {FLAGS} - Trả về số lượng cờ hiện tại.
        # {FLAGS_ADDED} - Trả về số lượng cờ được thêm vào.
        # {MAXFLAGS} - Trả về số lượng cờ để được phát hiện.
