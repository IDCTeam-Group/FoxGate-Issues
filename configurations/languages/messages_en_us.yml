# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:

    # 🦊 Kick message when the plugin blocks a player.
    #
    # {PLAYER} - Returns the player's name.
    # {IP} - Returns the player's IP.
    # {UUID} - Returns the player's UUID. (BungeeCord doesn't support this)
    # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
    # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
    # {COUNTRY} - Returns the player's country. (Only works with premium version).
    # {ASN} - Return the player's ASN (Only works with premium version).
    kick:
        vpn: '<red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>Your connection was denied for being VPN or Proxy.\n<gray>Try disabling first your VPN/proxy before joining.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: Services</dark_gray>'
        iplimiter: '<red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>Your connection was denied for joining.\n<gray>We found too much connections in your same IP.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: IPLimiter</dark_gray>'
        isp: '<red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>Your connection was denied for being malicious.\n<gray>The Internet Service Provider "<light_purple>{ISP}</light_purple>" that you use it''s forbidden in this server.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: ISPFilter</dark_gray>'
        iprange: '<red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>Your connection was denied for being malicious.\n<gray>The IP are in a blacklist in our database for being in a malicious range.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: IPRange</dark_gray>'
        bogon: <red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>Your connection was denied for being bogon.\n<gray>The IP are considered a bogon, private network.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz
        country: '<red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>Your connection was denied for being malicious.\n<gray>The country that you are "<light_purple>{COUNTRY}</light_purple>" it''s forbidden in this server.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: Country</dark_gray>'
        asn: '<red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>Your connection was denied for being VPN or Proxy.\n<gray>The Internet Service Provider ASN "<light_purple>{ASN}</light_purple>" it''s a known VPN or Tor provider.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>Module: ASN</dark_gray>'
        # Some placeholders don't work in this message because it's used to kick
        # the player when they try to join and their IP is still being verified in
        # a pre-check. This prevents duplicate verification until the previous
        # one is complete.
        checking: <red><bold>✘</bold> You were blocked by <bold>FoxGate AntiVPN</bold>:\n\n<white>We''re checking your connection.\n<gray>FoxGate it''s scanning your connection, please wait a few seconds.</gray>\n\n<gold>Is this an error?</gold> <white>Join our discord server.\n<aqua><underlined>discord.idcteam.xyz
    # 📍 Notification when a player is kicked. You can prevent this message by leaving it blank.
    notify:
        vpn: '{prefix} <aqua>{player} <gray>was detected using a VPN and was kicked! <green>({IP})'
        isp: '{prefix} <aqua>{player} <gray>was kicked for joining with a blacklisted ISP: <aqua>{ISP}</aqua>! <green>({IP})'
        iprange: '{prefix} <aqua>{player} <gray>was kicked for joining with a blacklisted IPRange! <green>({IP})'
        bogon: '{prefix} <aqua>{player} <gray>tried to join from a bogon IP: <green>{IP}</green>!'
        country: '{prefix} <aqua>{player} <gray>was kicked for joining with a blacklisted country: <aqua>{COUNTRY}</aqua>! <green>({IP})'
        asn: '{prefix} <aqua>{player} <gray>was kicked for joining with a blacklisted ASN: <aqua>{ASN}</aqua>! <green>({IP})'
        #
        # Message to send when player tries to join but it's blocked.
        # Leave empty to disable this thing. Just works {PLAYER} and {IP} placeholders.
        blocked: '{prefix} <aqua>{player} <gray>tried to connect but was blocked previously. <green>({IP})'
    # 🔎 Message to show when a player it's blocked by a module. (For status command)
    blocked:
        isp: <gold>Blocked by their ISP.
        iprange: <gold>Blocked by their IPRange.
        bogon: <gold>Blocked for Bogon IP.
        country: <gold>Blocked by their Country.
        asn: <gold>Blocked by their ASN.
    # 🧩 This will only show up in the console.
    # This can help with debug in case a service is not working correctly.
    # You can prevent this message by leaving it blank.
    error: '{prefix} Error while verifying VPN with <aqua>"{service}"</aqua> and <yellow>{player}</yellow>: {error}'
    # 🪄 Determine the message prefix for the plugin.
    prefix: <yellow><bold>FGT</bold></yellow><dark_gray> ►<reset>
    help:
        add: Add a IP to the database.
        alts: Check all users in one IP.
        check: Check an external IP and save in database.
        clearcache: Clear the cache file of saved usernames.
        db: Purge or reconnect the database.
        debug: Debug FoxGate in the console.
        reload: Reload configuration file.
        remove: Remove an IP from the database.
        status: View information about a cached IP in the database.
        update: Automatically updates plugin components for you.
        verbose: Enable/disable verbose mode.
        whitelist: Whitelist a user or IP.
        predebug: (Premium) Send a discord webhook or telegram forward to test how they look.
    alts:
        invalidip: '{prefix} {IP}<red> is not a valid IP/Username!'
        invalidcheck: '{prefix} {IP}<red> we cannot find the IP/user request from cache!'
        checking: '{prefix} {IP}<yellow> checking for alts...'
        # Here you can find these placeholders:
        #
        # {NAME} - Returns the player's names. (only for 'output')
        # {IP} - Returns the player's IP.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {ALTS} - Returns the alts from the User/IP.
        # {OUTPUT} - Returns the format of 'output'.
        # {TIME} - Returns the last time. (only for 'output')
        # {TIME_AGO} - Returns the last time ago. (only for 'output')
        # {COUNTRY} - Returns the IP's country. (Only works with premium version).
        # {ASN} - Return the IP's ASN (Only works with premium version).
        # {SIMILAR} - Display similar if was found with dynamic IP, otherwise will be blank.
        output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - Last connection: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
        info: ' \n <green>Viewing Alts of <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Alts:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Country: <aqua>{GEO_COUNTRY} \n '
        # View about the format date here:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: yyyy-MM-dd HH:mm:ss
        day: day
        hour: hour
        minute: minute
        second: second
        plural_day: days
        plural_hour: hours
        plural_minute: minutes
        plural_second: seconds
        similar: <click:run_command:"/foxgate alts {IP}"><hover:show_text:"Click for see alts."><gold>[Similar]</gold></hover></click>
        online: <click:run_command:"/foxgate status {IP}"><hover:show_text:"Click for checking status."><green>Online</green></hover></click>
    add_remove:
        invalidip: '{prefix} {IP}<red> is not a valid IP/Username!'
        already: '{prefix} {IP}<red> is already added/removed from the database!'
        add: '{prefix} {IP}<green> has been added to the dabatase!'
        remove: '{prefix} {IP}<green> has been removed from the database!'
    check:
        invalidip: '{prefix} {IP}<red> is not a valid IP/Username!'
        cached: '{prefix} {IP}<yellow> is already cached in the database. You can <white><underlined><click:run_command:"/foxgate status {IP}">click here to view information saved in the database</click></underlined></white>.'
        checking: '{prefix} <yellow>Checking <white>{IP}<yellow>...'
        saving: '{prefix} <yellow>Already finish checking for <white>{IP}</white>, waiting for the database in saving data...'
        checked: '{prefix} {IP}<green> was successfully checked, view the information obtained in the database with the command <gray>(/foxgate status)</gray> or <white><underlined><click:run_command:"/foxgate status {IP}">click here</click></underlined></white>.'
        pre-checking: '{prefix} {IP}<yellow> is being scanned for a previous check, wait for the results first before running another in this same IP.'
    clearcache:
        purging: '{prefix} <white>We are <yellow>purging</yellow> the cache file...'
        purging_correctly: '{prefix} <green>The cache file has been purged.'
        purging_problem: '{prefix} <red>Error while trying to purge the cache file. Check the console.'
    db:
        invalid_usage: '{prefix} Use the command <aqua>/foxgate db <purge/reconnect><reset>.'
        reconnecting: '{prefix} <yellow>Trying to reconnecting to the database...'
        reconnect_correctly: '{prefix} <green>The database was reconnected to.'
        reconnect_problem: '{prefix} <red>Error while trying to reconnect to the database. Check the console.'
        purging: '{prefix} <yellow>Trying to purging the database...'
        purging_correctly: '{prefix} <green>The database has been purged.'
        purging_problem: '{prefix} <red>Error while trying to purge the database. Check the console.'
    debug:
        enable: '{prefix} <green>Enabled debug mode. Check the console.'
        disable: '{prefix} <red>Disabled debug mode.'
    reload:
        message: '{prefix} <green>The configuration file has been reloaded.'
    status:
        invalidip: '{prefix} {IP}<red> is not a valid IP!'
        # Here you can find new placeholders only for this message:
        #
        # {DETECTED} - Return only the services that detected a VPN with an IP.
        # {UNDETECTED} - Return only the services that didn't detect a VPN with an IP.
        # {LIST} - Return both lists, but with different colors (customizable).
        # {MAX} - Return the maximum number of flags required to deny access to a player.
        # {COUNT_DETECTED} - Return the number of services that a player's IP has been detected with.
        # {COUNT_UNDETECTED} - Return the number of services that a player's IP hasn't been detected with.
        # {STATUS} - Return the status of the player.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
        # {GEO_COUNTRY} - Returns the player's country. (Only works with premium version).
        # {GEO_ASN} - Return the player's ASN (Only works with premium version).
        detected: <red>
        undetected: <green>
        none: <red>None.
        no_cached: <red>Not cached in the database.
        allow: <green>Verified.
        deny: <red>Blocked.
        saved: <yellow>Scanned.
        info: ' \n <green>Viewing status of <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>Hostname: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>Status: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>Undetected: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>Detected: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>Services: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Country: <aqua>{GEO_COUNTRY} \n '
    update:
        invalid_usage: '{prefix} Use the command <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>We are already downloading a file...'
        backend_down: '{prefix} <red>Our backend seems to be down or unstable. We can''t update and complete the request.'
        invalid_license: '{prefix} <red>Your license isn''t valid, put a valid key for this action.'
        downloading_asn: '{prefix} <yellow>Downloading ASN...'
        downloading_ranges: '{prefix} <yellow>Downloading Ranges...'
        downloading_hostnames: '{prefix} <yellow>Downloading Hostnames...'
        downloading_jar: '{prefix} <yellow>Downloading plugin...'
        downloaded_asn: '{prefix} <green>Downloaded latest ASN from our backend/central. Already applied changes.'
        downloaded_ranges: '{prefix} <green>Downloaded latest Ranges from our backend/central. Already applied changes.'
        downloaded_hostnames: '{prefix} <green>Downloaded latest Hostnames from our backend/central. Already applied changes.'
        downloaded_jar: '{prefix} <green>Downloaded latest JAR from our backend/central. Restart your server for apply changes.'
    verbose:
        enable: '{prefix} <green>You enabled verbose mode.'
        disable: '{prefix} <red>You disabled verbose mode.'
        # Here you can find new placeholders only for this message:
        #
        # {PLAYER} - Returns the player's name.
        # {IP} - Returns the player's IP.
        # {SERVICE} - Return the service's name.
        # {FLAGS} - Return the currently amount of Flags.
        # {FLAGS_ADDED} - Return the amount of Flags added.
        # {MAXFLAGS} - Return the amount of Flags for being detected.
        no_malicious: '{prefix} <green>[VERBOSE] <aqua>{PLAYER} <gray>is not a VPN with service: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flags:</gray><red>{FLAGS}</red><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        malicious: '{prefix} <red>[VERBOSE] <aqua>{PLAYER} <gray>is marked as a VPN with service: <aqua>{SERVICE}</aqua> <dark_gray>|</dark_gray> <gray>ip:</gray><yellow>{IP}</yellow> <gray>flags:</gray><red>{FLAGS}</red><green>(+{FLAGS_ADDED})</green><dark_gray>/</dark_gray><light_purple>{MAXFLAGS}</light_purple>'
        ignored: '{prefix} <yellow>[VERBOSE] <aqua>{PLAYER} <gray>has been ignored due to being whitelisted in <green>{type} <dark_gray>({IP})'
    whitelist:
        invalid_usage: '{prefix} Use the command <dark_gray>''''</dark_gray>/fg whitelist <green><add/remove/info/purge></green> <yellow>[name/ip]</yellow> <aqua>[reason]</aqua> <light_purple>[time]</light_purple><dark_gray>''''</dark_gray><reset>.'
        already: '{prefix} {IP}<red> is already whitelisted/unwhitelisted in the config!'
        whitelisting: '{prefix} <yellow>Saving to whitelist: <white>{IP}</white>, a moment...'
        whitelisted: '{prefix} {IP}<green> was whitelisted in the config with type <white>{type}</white> for <white>{time}</white>. You can <white><underlined><click:run_command:"/foxgate whitelist remove {IP}">click here to remove it again</click></underlined></white>.'
        unwhitelisting: '{prefix} <yellow>Removing to whitelist: <white>{IP}</white>, a moment...'
        unwhitelisted: '{prefix} {IP}<green> was unwhitelisted in the config with type <white>{type}</white>. You can <white><underlined><click:run_command:"/foxgate whitelist add {IP}">click here to add it again</click></underlined></white>.'
        type_ip: IP
        type_name: Name
        problem: '{prefix} <red>Error while trying to add/remove to the whitelist. Check the console.'
        invalid_time: '{prefix} <red>The time format is invalid. Use epoch or formats like <white>1d</white>, <white>3h</white>, <white>15m</white>, <white>30s</white> or <white>permanent</white>.'
        purging: '{prefix} <yellow>Trying to purging the whitelist...'
        purging_correctly: '{prefix} <green>The whitelist has been purged.'
        purging_problem: '{prefix} <red>Error while trying to purge the whitelist. Check the console.'
        # Here you can find new placeholders only for this message:
        #
        # {TYPE} - Return "IP"/"Name".
        # {REASON} - Return the reason why this name/IP is whitelisted.
        # {EXPIRATION} - Return the expiration time.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
        # {GEO_COUNTRY} - Return the country player (Premium and only works enabling the feature).
        # {GEO_ASN} - Return the ASN player (Premium and only works enabling the feature).
        info: ' \n <green>Whitelist information of <aqua>{IP}\n <dark_gray>▪ <white>Type: <gold>{TYPE}</gold> \n <dark_gray>▪ <white>Reason: <yellow>{REASON}</yellow>\n <dark_gray>▪ <white>Expire: <light_purple>{EXPIRATION}</light_purple>\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>Country: <aqua>{GEO_COUNTRY} \n '
        # View about the format date here:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: yyyy-MM-dd HH:mm:ss
        permanent: Permanent.
        noreason: No reason.
        nowhitelist: '{prefix} {IP}<red> isn''''t saved in the whitelist in type <white>{type}</white>.'
    predebug:
        invalid_usage: '{prefix} Use the command <aqua>/fg <dwdebug/tgdebug> <green><allow/deny/country/asn/isp></green><reset>.'
        sending: '{prefix} <yellow>Sending to test your <white>{type}</white> in mode <white>{mode}</white>...</yellow>'
        sended: '{prefix} <green>Sent!'
        problem: '{prefix} <red>Error while trying to send a debug of <white>{type}</white>!'