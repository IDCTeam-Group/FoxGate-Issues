# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:

    # 🦊 Kick message when the plugin blocks a player.
    #
    # {PLAYER} - Returns the player's name.
    # {IP} - Returns the player's IP.
    # {UUID} - Returns the player's UUID. (BungeeCord doesn't support this)
    # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
    # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
    # {COUNTRY} - Returns the player's country. (Only works with premium version).
    # {ASN} - Return the player's ASN (Only works with premium version).
    kick:
        vpn: '<red><bold>✘</bold> คุณถูกบล็อกโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>การเชื่อมต่อของคุณถูกปฏิเสธเนื่องจากคุณใช้ VPN หรือ Proxy\n<gray>กรุณาปิดการใช้งาน VPN/Proxy ก่อนเข้าสู่เซิร์ฟเวอร์</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>โมดูล: Services</dark_gray>'
        iplimiter: '<red><bold>✘</bold> คุณถูกบล็อกโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>การเชื่อมต่อของคุณถูกปฏิเสธ\n<gray>เราพบการเชื่อมต่อจาก IP เดียวกันมากเกินไป</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>โมดูล: IPLimiter</dark_gray>'
        isp: '<red><bold>✘</bold> คุณถูกบล็อกโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>การเชื่อมต่อของคุณถูกปฏิเสธเนื่องจากอาจเป็นอันตราย\n<gray>ผู้ให้บริการอินเทอร์เน็ต "<light_purple>{ISP}</light_purple>" ที่คุณใช้นั้นถูกแบนบนเซิร์ฟเวอร์นี้</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>โมดูล: ISPFilter</dark_gray>'
        iprange: '<red><bold>✘</bold> คุณถูกบล็อกโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>การเชื่อมต่อของคุณถูกปฏิเสธเนื่องจากอาจเป็นอันตราย\n<gray>IP ของคุณอยู่ในบัญชีดำในฐานข้อมูลของเราเนื่องจากอยู่ในช่วงที่อยู่ที่เป็นอันตราย</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>โมดูล: IPRange</dark_gray>'
        bogon: '<red><bold>✘</bold> คุณถูกบล็อกโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>การเชื่อมต่อของคุณถูกปฏิเสธเนื่องจากมาจากที่อยู่ bogon\n<gray>IP นี้ถือเป็น bogon (เครือข่ายส่วนตัว/สงวนไว้)</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz'
        country: '<red><bold>✘</bold> คุณถูกบล็อกโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>การเชื่อมต่อของคุณถูกปฏิเสธเนื่องจากอาจเป็นอันตราย\n<gray>ประเทศ "<light_purple>{COUNTRY}</light_purple>" ที่คุณเชื่อมต่อจากถูกแบนบนเซิร์ฟเวอร์นี้</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>โมดูล: Country</dark_gray>'
        asn: '<red><bold>✘</bold> คุณถูกบล็อกโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>การเชื่อมต่อของคุณถูกปฏิเสธเนื่องจากคุณใช้ VPN หรือ Proxy\n<gray>ผู้ให้บริการอินเทอร์เน็ต (ASN) "<light_purple>{ASN}</light_purple>" เป็นผู้ให้บริการ VPN หรือ Tor ที่รู้จัก</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz\n\n<gray>{IP} - {ISP} ({ASN})</gray>\n<dark_gray>โมดูล: ASN</dark_gray>'
        # Some placeholders don't work in this message because it's used to kick
        # the player when they try to join and their IP is still being verified in
        # a pre-check. This prevents duplicate verification until the previous
        # one is complete.
        checking: '<red><bold>✘</bold> กำลังรอการตรวจสอบโดย <bold>FoxGate AntiVPN</bold>:\n\n<white>เรากำลังตรวจสอบการเชื่อมต่อของคุณ\n<gray>FoxGate กำลังสแกนการเชื่อมต่อของคุณ โปรดรอสักครู่</gray>\n\n<gold>นี่เป็นข้อผิดพลาดหรือไม่?</gold> <white>เข้าร่วมเซิร์ฟเวอร์ Discord ของเรา\n<aqua><underlined>discord.idcteam.xyz'
    # 📍 Notification when a player is kicked. You can prevent this message by leaving it blank.
    notify:
        vpn: '{prefix} <aqua>{player} <gray>ถูกตรวจพบว่าใช้ VPN และถูกเตะ! <green>({IP})'
        isp: '{prefix} <aqua>{player} <gray>ถูกเตะเนื่องจากเชื่อมต่อกับ ISP ที่ถูกแบน: <aqua>{ISP}</aqua>! <green>({IP})'
        iprange: '{prefix} <aqua>{player} <gray>ถูกเตะเนื่องจากเชื่อมต่อจากช่วง IP ที่ถูกแบน! <green>({IP})'
        bogon: '{prefix} <aqua>{player} <gray>พยายามเชื่อมต่อจาก IP Bogon: <green>{IP}</green>!'
        country: '{prefix} <aqua>{player} <gray>ถูกเตะเนื่องจากเชื่อมต่อจากประเทศที่ถูกแบน: <aqua>{COUNTRY}</aqua>! <green>({IP})'
        asn: '{prefix} <aqua>{player} <gray>ถูกเตะเนื่องจากเชื่อมต่อกับ ASN ที่ถูกแบน: <aqua>{ASN}</aqua>! <green>({IP})'
        #
        # Message to send when player tries to join but it's blocked.
        # Leave empty to disable this thing. Just works {PLAYER} and {IP} placeholders.
        blocked: '{prefix} <aqua>{player} <gray>พยายามเชื่อมต่อแต่ถูกบล็อกก่อนหน้านี้ <green>({IP})'
    # 🔎 Message to show when a player it's blocked by a module. (For status command)
    blocked:
        isp: '<gold>ถูกบล็อกเนื่องจาก ISP ของพวกเขา'
        iprange: '<gold>ถูกบล็อกเนื่องจากช่วง IP ของพวกเขา'
        bogon: '<gold>ถูกบล็อกเนื่องจาก IP Bogon'
        country: '<gold>ถูกบล็อกเนื่องจากประเทศของพวกเขา'
        asn: '<gold>ถูกบล็อกเนื่องจาก ASN ของพวกเขา'
    # 🧩 This will only show up in the console.
    # This can help with debug in case a service is not working correctly.
    # You can prevent this message by leaving it blank.
    error: '{prefix} ข้อผิดพลาดขณะตรวจสอบ VPN กับ <aqua>"{service}"</aqua> สำหรับ <yellow>{player}</yellow>: {error}'
    # 🪄 Determine the message prefix for the plugin.
    prefix: '<yellow><bold>FGT</bold></yellow><dark_gray> ►<reset>'
    help:
        add: เพิ่ม IP ลงในฐานข้อมูล
        alts: ตรวจสอบผู้ใช้ทั้งหมดใน IP เดียว
        check: ตรวจสอบ IP ภายนอกและบันทึกในฐานข้อมูล
        clearcache: ล้างไฟล์แคชของชื่อผู้ใช้ที่บันทึกไว้
        db: ล้าง (purge) หรือเชื่อมต่อฐานข้อมูลใหม่
        debug: แก้ไขข้อผิดพลาด FoxGate ในคอนโซล
        reload: โหลดไฟล์การกำหนดค่าใหม่
        remove: ลบ IP ออกจากฐานข้อมูล
        status: ดูข้อมูลเกี่ยวกับ IP ที่แคชไว้ในฐานข้อมูล
        update: อัปเดตส่วนประกอบปลั๊กอินโดยอัตโนมัติสำหรับคุณ
        verbose: เปิด/ปิดโหมด verbose
        whitelist: เพิ่มผู้ใช้หรือ IP ในไวท์ลิสต์
        predebug: (พรีเมียม) ส่ง webhook Discord หรือ Telegram forward เพื่อทดสอบลักษณะที่ปรากฏ
    alts:
        invalidip: '{prefix} {IP}<red> ไม่ใช่ IP/ชื่อผู้ใช้ที่ถูกต้อง!'
        invalidcheck: '{prefix} {IP}<red> เราไม่พบคำขอ IP/ผู้ใช้จากแคช!'
        checking: '{prefix} {IP}<yellow> กำลังตรวจสอบบัญชีสำรอง...'
        # Here you can find these placeholders:
        #
        # {NAME} - Returns the player's names. (only for 'output')
        # {IP} - Returns the player's IP.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {ALTS} - Returns the alts from the User/IP.
        # {OUTPUT} - Returns the format of 'output'.
        # {TIME} - Returns the last time. (only for 'output')
        # {TIME_AGO} - Returns the last time ago. (only for 'output')
        # {COUNTRY} - Returns the IP's country. (Only works with premium version).
        # {ASN} - Return the IP's ASN (Only works with premium version).
        # {SIMILAR} - Display similar if was found with dynamic IP, otherwise will be blank.
        output: ' <dark_gray>▪</dark_gray> <reset>{NAME} - การเชื่อมต่อล่าสุด: {TIME} <dark_gray>(</dark_gray>{TIME_AGO}<dark_gray>)</dark_gray> {SIMILAR}'
        info: ' \n <green>กำลังดูบัญชีสำรองของ <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>บัญชีสำรอง:\n {ALTS}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>ประเทศ: <aqua>{GEO_COUNTRY} \n '
        # View about the format date here:
        # https://docs.oracle.com/javase/8/docs/api/java/text/SimpleDateFormat.html
        format: yyyy-MM-dd HH:mm:ss
        day: วัน
        hour: ชั่วโมง
        minute: นาที
        second: วินาที
        plural_day: วัน
        plural_hour: ชั่วโมง
        plural_minute: นาที
        plural_second: วินาที
        similar: '<click:run_command:"/foxgate alts {IP}"><hover:show_text:"คลิกเพื่อดูบัญชีสำรอง"><gold>[คล้ายกัน]</gold></hover></click>'
        online: '<click:run_command:"/foxgate status {IP}"><hover:show_text:"คลิกเพื่อตรวจสอบสถานะ"><green>ออนไลน์</green></hover></click>'
    add_remove:
        invalidip: '{prefix} {IP}<red> ไม่ใช่ IP/ชื่อผู้ใช้ที่ถูกต้อง!'
        already: '{prefix} {IP}<red> ถูกเพิ่ม/ลบออกจากฐานข้อมูลแล้ว!'
        add: '{prefix} {IP}<green> ถูกเพิ่มลงในฐานข้อมูลแล้ว!'
        remove: '{prefix} {IP}<green> ถูกลบออกจากฐานข้อมูลแล้ว!'
    check:
        invalidip: '{prefix} {IP}<red> ไม่ใช่ IP/ชื่อผู้ใช้ที่ถูกต้อง!'
        cached: '{prefix} {IP}<yellow> อยู่ในแคชของฐานข้อมูลแล้ว คุณสามารถ <white><underlined><click:run_command:"/foxgate status {IP}">คลิกที่นี่เพื่อดูข้อมูลที่บันทึกในฐานข้อมูล</click></underlined></white>'
        checking: '{prefix} <yellow>กำลังตรวจสอบ <white>{IP}<yellow>...'
        saving: '{prefix} <yellow>ตรวจสอบ <white>{IP}</white> เสร็จสิ้น กำลังรอฐานข้อมูลบันทึกข้อมูล...'
        checked: '{prefix} {IP}<green> ถูกตรวจสอบสำเร็จ ดูข้อมูลที่ได้รับในฐานข้อมูลด้วยคำสั่ง <gray>(/foxgate status)</gray> หรือ <white><underlined><click:run_command:"/foxgate status {IP}">คลิกที่นี่</click></underlined></white>'
        pre-checking: '{prefix} {IP}<yellow> กำลังถูกสแกนจากการตรวจสอบก่อนหน้า โปรดรอผลลัพธ์ก่อนที่จะเรียกใช้การตรวจสอบอื่นใน IP เดียวกันนี้'
    clearcache:
        purging: '{prefix} <white>เรากำลัง<yellow>ล้าง</yellow>ไฟล์แคช...'
        purging_correctly: '{prefix} <green>ไฟล์แคชถูกล้างแล้ว'
        purging_problem: '{prefix} <red>ข้อผิดพลาดขณะพยายามล้างไฟล์แคช ตรวจสอบคอนโซล'
    db:
        invalid_usage: '{prefix} ใช้คำสั่ง <aqua>/foxgate db <purge/reconnect><reset>'
        reconnecting: '{prefix} <yellow>กำลังพยายามเชื่อมต่อกับฐานข้อมูลอีกครั้ง...'
        reconnect_correctly: '{prefix} <green>เชื่อมต่อฐานข้อมูลอีกครั้งสำเร็จ'
        reconnect_problem: '{prefix} <red>ข้อผิดพลาดขณะพยายามเชื่อมต่อกับฐานข้อมูลอีกครั้ง ตรวจสอบคอนโซล'
        purging: '{prefix} <yellow>กำลังพยายามล้าง (purge) ฐานข้อมูล...'
        purging_correctly: '{prefix} <green>ล้างฐานข้อมูลสำเร็จ'
        purging_problem: '{prefix} <red>ข้อผิดพลาดขณะพยายามล้างฐานข้อมูล ตรวจสอบคอนโซล'
    debug:
        enable: '{prefix} <green>เปิดโหมดดีบักแล้ว ตรวจสอบคอนโซล'
        disable: '{prefix} <red>ปิดโหมดดีบักแล้ว'
    reload:
        message: '{prefix} <green>โหลดไฟล์การกำหนดค่าใหม่แล้ว'
    status:
        invalidip: '{prefix} {IP}<red> ไม่ใช่ IP ที่ถูกต้อง!'
        # Here you can find new placeholders only for this message:
        #
        # {DETECTED} - Return only the services that detected a VPN with an IP.
        # {UNDETECTED} - Return only the services that didn't detect a VPN with an IP.
        # {LIST} - Return both lists, but with different colors (customizable).
        # {MAX} - Return the maximum number of flags required to deny access to a player.
        # {COUNT_DETECTED} - Return the number of services that a player's IP has been detected with.
        # {COUNT_UNDETECTED} - Return the number of services that a player's IP hasn't been detected with.
        # {STATUS} - Return the status of the player.
        # {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
        # {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
        # {GEO_COUNTRY} - Returns the player's country. (Only works with premium version).
        # {GEO_ASN} - Return the player's ASN (Only works with premium version).
        detected: <red>
        undetected: <green>
        none: <red>ไม่มี
        no_cached: <red>ไม่ได้แคชในฐานข้อมูล
        allow: <green>ยืนยันแล้ว
        deny: <red>ถูกบล็อก
        saved: <yellow>ถูกสแกน
        info: ' \n <green>กำลังดูสถานะของ <aqua>{IP}\n <dark_gray>▪ <white>ISP: <light_purple>{ISP}</light_purple>\n <dark_gray>▪ <white>ชื่อโฮสต์: <yellow>{HOSTNAME}</yellow>\n <dark_gray>▪ <white>สถานะ: {STATUS} <yellow>({COUNT_DETECTED}/{MAX})</yellow>\n    <white>ไม่ถูกตรวจพบ: <green>{COUNT_UNDETECTED} <dark_gray>❙ <white>ถูกตรวจพบ: <red>{COUNT_DETECTED} \n <dark_gray>▪ <white>บริการ: {LIST}\n <dark_gray>▪ <white>ASN: <yellow>{GEO_ASN} \n <dark_gray>▪ <white>ประเทศ: <aqua>{GEO_COUNTRY} \n '
    update:
        invalid_usage: '{prefix} ใช้คำสั่ง <dark_gray>''</dark_gray>/fg update <green><asn/plugin/ranges/hostnames></green><dark_gray>''</dark_gray><reset>'
        already_downloading: '{prefix} <red>เรากำลังดาวน์โหลดไฟล์อยู่...'
        backend_down: '{prefix} <red>แบ็กเอนด์ของเราดูเหมือนจะล่มหรือไม่เสถียร เราไม่สามารถอัปเดตและดำเนินการตามคำขอได้'
        invalid_license: '{prefix} <red>ใบอนุญาตของคุณไม่ถูกต้อง ใส่คีย์ที่ถูกต้องสำหรับการดำเนินการนี้'
        downloading_asn: '{prefix} <yellow>กำลังดาวน์โหลด ASN...'
        downloading_ranges: '{prefix} <yellow>กำลังดาวน์โหลดช่วง IP...'
        downloading_hostnames: '{prefix} <yellow>กำลังดาวน์โหลดชื่อโฮสต์...'
        downloading_jar: '{prefix} <yellow>กำลังดาวน์โหลดปลั๊กอิน...'
        downloaded_asn: '{prefix} <green>ดาวน์โหลด ASN ล่าสุดจากแบ็กเอนด์/ส่วนกลางของเรา ใช้การเปลี่ยนแปลงแล้ว'
