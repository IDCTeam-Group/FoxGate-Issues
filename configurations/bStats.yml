#
# bStats (https://bStats.org) collects some basic information for plugin authors, like how
# many people use their plugin and their total player count. It's recommended to keep bStats
# enabled, but if you're not comfortable with this, you can turn this setting off. There is no
# performance penalty associated with having metrics enabled, and data sent to bStats is fully
# anonymous.

#  📍 All pages of FoxGate in bStats:
#  - Bukkit: https://bstats.org/plugin/bukkit/FoxGate-Bukkit/22142
#  - BungeeCord: https://bstats.org/plugin/bungeecord/FoxGate-Bungeecord/22460
#  - Velocity: https://bstats.org/plugin/velocity/FoxGate-Velocity/22969
#  - Nukkit: https://bstats.org/plugin/bukkit/FoxGate-Nukkit/26461
#  - WaterdogPE: https://bstats.org/plugin/bungeecord/FoxGate-WaterdogPE/26515
#  - Hytale: https://bstats.org/plugin/bukkit/FoxGate-Hytale/28871

# 📚 Note: To disable usage of bStats in the plugin FoxGate, please check the 'config.yml'
# file for it, option with the name 'metrics'. Read any details required in the comments from that
# option.
# ⚠️ Warning! This file exists for manage the usage of metrics in this plugin, the code of bStats
# still the same (including the changes). If you disable the bStats in the folder for all plugins,
# you need to disable this too.

# 📍 Logger.
#  - Logs to console any type of data about bStats. In
#    production it's recommended to disable for avoid flood
#    in your console. (probably bStats will ratelimit
#    for others plugins that uses bStats too)
logFailedRequests: false
logSentData: false
logResponseStatusText: false
