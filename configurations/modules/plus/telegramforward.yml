#
# Manage the usage of Telegram Forwards for sending
# notifications to telegram.
# If the player get scanned, the result will be sended
# to a private channel using their API with Bots. Useful
# for monitoring.
#
#  📚 Learn more about bots in Telegram:
#  🔗 https://core.telegram.org/bots#how-do-i-create-a-bot
#
# 🚩 Supported placeholders for this section:
#  - {NAME} - Returns the player's name.
#  - {IP} - Returns the player's IP.
#  - {UUID} - Returns the player's UUID. (BungeeCord doesn't support this)
#  - {DETECTED} - Return only the services that detected a VPN with an IP.
#  - {UNDETECTED} - Return only the services that didn't detect a VPN with an IP.
#  - {LIST} - Return both lists.
#  - {MAX} - Return the maximum number of flags required to deny access to a player.
#  - {COUNT_DETECTED} - Return the number of services that a player's IP has been detected with.
#  - {COUNT_UNDETECTED} - Return the number of services that a player's IP hasn't been detected with.
#  - {ISP} - Returns the ISP of the IP, (in case it's cached/IP), from ISP module.
#  - {HOSTNAME} - Returns the Hostname of the IP, (in case it's cached/IP), from ISP Module.
#  - {GEO_COUNTRY} - Returns the player's country. (Only works with Plus Edition).
#  - {GEO_ASN} - Return the player's ASN (Only works with Plus Edition).
#
# ❓ Has questions? Join to the discord server:
# - https://discord.zowi.gay/
# - https://discord.idcteam.xyz/

# 💼 Enter here the bot's token.
# - If you leave this empty, will disable this
#   feature.
#
# 📚 See how to use in:
# 🔗 https://core.telegram.org/bots/webhooks
bot_token: ''

# 🧵 Enter here the URL of Telegram.
# - Change the URL if it's required to do reverse-proxy.
#   It's required to still follow the Telegram format to
#   make this works right.
#
# 📚 Always recommended to use the default value if you doesn't
# contains problems. Use '{TOKEN}' for use 'bot_token' field.
url: https://api.telegram.org/bot{TOKEN}/sendMessage

# 🌱 Reverse Proxy for the requests.
# - Use this feature in case you want to bypass any restriction
#   in your country. This can make the request a bit slow, but can
#   make the plugin works fine with this module.
#
#   ⚠ Supported types:
#    - HTTP
#    - SOCKS4
#    - SOCKS5
#
# 📚 Note: Enable this feature when it's required and try to follow
# the format-type.
reverse_proxy:

    # 🚩 Enable this feature?
    enabled: false
    # 💼 Type the proxy type.
    # - Select one proxy type to use. Chooise right.
    #
    #   ⚠ Supported types:
    #    - HTTP
    #    - SOCKS4
    #    - SOCKS5
    type: HTTP
    # 🚩 Determine the host of the Proxy.
    # - Type one domain or IP for use the proxy and one port
    #   for auth.
    #
    # ⚠️ Warning! Those values can't be empty.
    host: ''
    port: '8080'

    # 🧵 Credentials.
    # - Put any credential for authentication if it's required
    #   by the proxy provider.
    #
    # 📚 Note: Leave empty for don't use any of those fields.
    user: ''
    password: ''

# Message when the player was allowed to connect.
allowed:
    # 🚩 Enable this forward?
    enable: true
    # 📚 Enter here the channel to send the alert.
    # - Must be unique identifier for the target chat or
    #   username of the target channel, ex. '@channel'
    chat_id: ''

    # 🧩 Determine here the content in the message.
    # - This is required to send the message.
    text: '*FoxGate: High Quality AntiVPN*%nl%%nl%Player *{NAME}* `({IP})` has been verified by *FoxGate* with a result of `{COUNT_DETECTED}/{MAX}` detected services.%nl%%nl%- Detected in `({COUNT_DETECTED})`: `{DETECTED}`%nl%- Undetected in `({COUNT_UNDETECTED})`: `{UNDETECTED}`%nl%- Country: `{GEO_COUNTRY}`%nl%- ASN: `{GEO_ASN}`'
    # 🧵 Determine here the thread message ID to send.
    # Set "" to disable this feature.
    #
    # - Use this in case you want send in different
    #   channel-thread to separate. This must be
    #   unique identifier for the target message thread
    #   (topic) of the forum; for forum supergroups only.
    thread_id: ''

    # 📍 Protect the message for privacy?
    # Protects the contents of the sent message from
    # forwarding and saving.
    protection: true
    # ⚠️ Disable notification sound?
    # Sends the message silently. Users will receive a
    # notification with no sound.
    nosound: true
    # 💼 Determine the mode of parsing.
    # Values can be:
    # - MarkdownV2 (Recommended)
    # - HTML
    # - Markdown
    #
    # 📚 Note: Invalid value will go to use "MarkdownV2".
    # 🔗 https://core.telegram.org/bots/api#formatting-options
    parsemode: MarkdownV2

